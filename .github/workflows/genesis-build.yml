name: Genesis 16.0 - Platinum Standard

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: pip install Pillow requests

      - name: Initialize Workspace
        run: mkdir -p MyPokemonGame/scripts

      - name: Generate Genesis Scripts
        run: |
          cd MyPokemonGame
          
          # --- SCRIPT 1: STABLE SCAFFOLD (FIXES FILE-NOT-FOUND) ---
          cat << 'EOF' > scripts/1-scaffold.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: # Fix: Only create directories if path is not root
                  os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          create_file("build.gradle", "plugins { id 'com.android.application' version '8.4.0' apply false }")
          create_file("settings.gradle", "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }; dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }; include ':app'")
          create_file("gradle.properties", "android.useAndroidX=true\nandroid.enableJetifier=true")
          create_file("app/build.gradle", "plugins { id 'com.android.application' }; android { namespace 'com.genesis.pokemon'; compileSdk 34; defaultConfig { applicationId 'com.genesis.pokemon'; minSdk 24; targetSdk 34; versionCode 1; versionName '16.0' }; buildTypes { release { minifyEnabled false } }; compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 } }; dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.9.0' }")
          create_file("app/src/main/AndroidManifest.xml", '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="Pokemon Platinum" android:theme="@style/Theme.Material3.DayNight.NoActionBar"><activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>')
          EOF

          # --- SCRIPT 2: D-PAD & START MENU UI ---
          cat << 'EOF' > scripts/2-ui.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          layout = """<?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000000">
              
              <com.genesis.pokemon.GameView android:id="@+id/game_viewport" android:layout_width="match_parent" android:layout_height="match_parent" />
              
              <GridLayout android:layout_width="180dp" android:layout_height="180dp" android:layout_gravity="bottom|start" android:columnCount="3" android:rowCount="3" android:layout_margin="20dp">
                  <View android:layout_width="60dp" android:layout_height="60dp"/> <Button android:id="@+id/btn_up" android:layout_width="60dp" android:layout_height="60dp" android:text="▲" android:backgroundTint="#424242"/> <View android:layout_width="60dp" android:layout_height="60dp"/>
                  <Button android:id="@+id/btn_left" android:layout_width="60dp" android:layout_height="60dp" android:text="◀" android:backgroundTint="#424242"/> <View android:layout_width="60dp" android:layout_height="60dp"/> <Button android:id="@+id/btn_right" android:layout_width="60dp" android:layout_height="60dp" android:text="▶" android:backgroundTint="#424242"/>
                  <View android:layout_width="60dp" android:layout_height="60dp"/> <Button android:id="@+id/btn_down" android:layout_width="60dp" android:layout_height="60dp" android:text="▼" android:backgroundTint="#424242"/> <View android:layout_width="60dp" android:layout_height="60dp"/>
              </GridLayout>

              <Button android:id="@+id/btn_start" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="MENU" android:layout_gravity="bottom|center_horizontal" android:layout_marginBottom="20dp" android:backgroundTint="#455A64"/>

              <LinearLayout android:id="@+id/start_menu" android:layout_width="200dp" android:layout_height="wrap_content" android:layout_gravity="end|top" android:layout_margin="20dp" android:orientation="vertical" android:background="#F5F5F5" android:padding="10dp" android:visibility="gone">
                  <Button android:id="@+id/menu_pokedex" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="POKEDEX" android:textColor="#000" android:backgroundTint="#E0E0E0"/>
                  <Button android:id="@+id/menu_save" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="SAVE" android:textColor="#000" android:backgroundTint="#E0E0E0"/>
              </LinearLayout>
          </FrameLayout>"""
          create_file("app/src/main/res/layout/activity_main.xml", layout)
          EOF

          # --- SCRIPT 3: PLATINUM ASSETS (CONVERTED TO SAFE RGBA) ---
          cat << 'EOF' > scripts/3-assets.py
          import os, requests
          from PIL import Image
          from io import BytesIO

          os.makedirs("app/src/main/assets/sprites", exist_ok=True)
          os.makedirs("app/src/main/assets/tiles", exist_ok=True)

          # Brendan Sprite Sheet (16x32px frames)
          url = "https://raw.githubusercontent.com/pret/pokeemerald/master/graphics/object_events/pics/people/brendan/normal.png"
          img = Image.open(BytesIO(requests.get(url).content)).convert("RGBA")
          img.save("app/src/main/assets/sprites/trainer.png")

          # Basic Sinnoh Tileset
          tiles = Image.new("RGBA", (128, 32))
          from PIL import ImageDraw
          d = ImageDraw.Draw(tiles)
          d.rectangle([0,0,32,32], fill="#4CAF50")   # Grass
          d.rectangle([32,0,64,32], fill="#9E9E9E")  # Path
          d.rectangle([64,0,96,32], fill="#1B5E20")  # Tree
          tiles.save("app/src/main/assets/tiles/world_tiles.png")
          EOF

          # --- SCRIPT 4: THE ENGINE (SCROLLING CAMERA & TILE-STEPPING) ---
          cat << 'EOF' > scripts/4-engine.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)
          java_path = "app/src/main/java/com/genesis/pokemon"

          create_file(f"{java_path}/GameView.java", """package com.genesis.pokemon;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.SurfaceView;
          import java.io.InputStream;

          public class GameView extends SurfaceView implements Runnable {
              private Thread thread;
              private boolean running;
              private Bitmap bmpTiles, bmpTrainer;
              
              // Grid Logic
              public int gx = 5, gy = 5; // Grid position
              public float px = gx * 64, py = gy * 64; // Pixel position
              public float tx = px, ty = py; // Target position
              public boolean moving = false;
              
              public boolean up, down, left, right;
              public int dir = 0; // 0:Down, 1:Up, 2:Left, 3:Right
              private int anim = 0, counter = 0;

              // 10x10 Map
              private int[][] map = {
                  {2,2,2,2,2,2,2,2,2,2},
                  {2,0,0,1,1,1,1,0,0,2},
                  {2,0,0,1,0,0,1,0,0,2},
                  {2,2,2,2,2,2,2,2,2,2}
              };

              public GameView(Context c, AttributeSet a) { super(c, a); }

              @Override public void run() {
                  loadAssets();
                  while (running) {
                      if (!getHolder().getSurface().isValid()) continue;
                      Canvas c = getHolder().lockCanvas();
                      update();
                      drawFrame(c);
                      getHolder().unlockCanvasAndPost(c);
                      try { Thread.sleep(16); } catch (Exception e) {}
                  }
              }

              private void loadAssets() {
                  try {
                      bmpTiles = BitmapFactory.decodeStream(getContext().getAssets().open("tiles/world_tiles.png"));
                      bmpTrainer = BitmapFactory.decodeStream(getContext().getAssets().open("sprites/trainer.png"));
                  } catch (Exception e) {}
              }

              private void update() {
                  float s = 4;
                  if (px < tx) px = Math.min(px + s, tx);
                  else if (px > tx) px = Math.max(px - s, tx);
                  if (py < ty) py = Math.min(py + s, ty);
                  else if (py > ty) py = Math.max(py - s, ty);

                  if (px == tx && py == ty) {
                      moving = false;
                      int nx = gx, ny = gy;
                      if (up) { ny--; dir = 1; moving = true; }
                      else if (down) { ny++; dir = 0; moving = true; }
                      else if (left) { nx--; dir = 2; moving = true; }
                      else if (right) { nx++; dir = 3; moving = true; }

                      if (moving && ny>=0 && ny<map.length && nx>=0 && nx<map[0].length && map[ny][nx] < 2) {
                          gx = nx; gy = ny;
                          tx = gx * 64; ty = gy * 64;
                      } else { moving = false; }
                  }

                  if (moving) {
                      counter++;
                      if (counter > 8) { anim = (anim + 1) % 4; counter = 0; }
                  } else { anim = 0; }
              }

              private void drawFrame(Canvas c) {
                  c.drawColor(Color.BLACK);
                  if (bmpTiles == null || bmpTrainer == null) return;

                  int sw = getWidth(), sh = getHeight();
                  int cx = (int)px - (sw / 2) + 32;
                  int cy = (int)py - (sh / 2) + 32;

                  // Draw Map
                  for (int y=0; y<map.length; y++) {
                      for (int x=0; x<map[0].length; x++) {
                          int t = map[y][x];
                          Rect src = new Rect(t*32, 0, (t*32)+32, 32);
                          Rect dst = new Rect(x*64 - cx, y*64 - cy, (x+1)*64 - cx, (y+1)*64 - cy);
                          c.drawBitmap(bmpTiles, src, dst, null);
                      }
                  }

                  // Draw Player (Centered)
                  int frame = (anim == 1) ? 0 : (anim == 3) ? 2 : 1; // Stand, Left, Stand, Right
                  Rect pSrc = new Rect(frame*16, dir*32, (frame+1)*16, (dir+1)*32);
                  Rect pDst = new Rect(sw/2-32, sh/2-64, sw/2+32, sh/2+64);
                  c.drawBitmap(bmpTrainer, pSrc, pDst, null);
              }
              public void resume() { running = true; thread = new Thread(this); thread.start(); }
              public void pause() { running = false; }
          }""")
          
          create_file(f"{java_path}/MainActivity.java", """package com.genesis.pokemon;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.MotionEvent;
          import android.view.View;

          public class MainActivity extends Activity {
              private GameView gv;
              private View menu;
              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
                  gv = findViewById(R.id.game_viewport);
                  menu = findViewById(R.id.start_menu);
                  
                  bind(R.id.btn_up, 1); bind(R.id.btn_down, 2);
                  bind(R.id.btn_left, 3); bind(R.id.btn_right, 4);
                  
                  findViewById(R.id.btn_start).setOnClickListener(v -> {
                      if (menu.getVisibility() == View.VISIBLE) { menu.setVisibility(View.GONE); gv.resume(); }
                      else { menu.setVisibility(View.VISIBLE); gv.pause(); }
                  });
              }
              private void bind(int id, int d) {
                  findViewById(id).setOnTouchListener((v, e) -> {
                      boolean p = e.getAction() == MotionEvent.ACTION_DOWN || e.getAction() == MotionEvent.ACTION_MOVE;
                      if (d==1) gv.up=p; if (d==2) gv.down=p; if (d==3) gv.left=p; if (d==4) gv.right=p;
                      return true;
                  });
              }
              @Override protected void onResume() { super.onResume(); gv.resume(); }
          }""")
          EOF

      - name: Build APK
        run: |
          cd MyPokemonGame
          python scripts/1-scaffold.py
          python scripts/2-ui.py
          python scripts/3-assets.py
          python scripts/4-engine.py
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Genesis-16-Platinum
          path: MyPokemonGame/app/build/outputs/apk/debug/app-debug.apk
