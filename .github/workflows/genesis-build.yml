name: Genesis 12.0 - Platinum Zenith

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: pip install Pillow requests

      - name: Initialize Workspace
        run: mkdir -p MyPokemonGame/scripts

      - name: Generate Genesis Scripts
        run: |
          cd MyPokemonGame
          
          # --- 1. SCAFFOLD (AndroidX + Gradle Fix) ---
          cat << 'EOF' > scripts/1-scaffold.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)
          create_file("build.gradle", "plugins { id 'com.android.application' version '8.4.0' apply false }")
          create_file("settings.gradle", "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }; dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }; include ':app'")
          create_file("gradle.properties", "android.useAndroidX=true\nandroid.enableJetifier=true")
          create_file("app/build.gradle", "plugins { id 'com.android.application' }; android { namespace 'com.genesis.pokemon'; compileSdk 34; defaultConfig { applicationId 'com.genesis.pokemon'; minSdk 24; targetSdk 34; versionCode 1; versionName '4.0' }; buildTypes { release { minifyEnabled false } }; compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 } }; dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.9.0' }")
          create_file("app/src/main/AndroidManifest.xml", '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="Pokemon Platinum" android:theme="@style/Theme.Material3.DayNight.NoActionBar"><activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>')
          EOF

          # --- 2. UI (Joystick & Start Menu Overlay) ---
          cat << 'EOF' > scripts/2-ui.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)
          layout = """<?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000000">
              <com.genesis.pokemon.GameView android:id="@+id/game_viewport" android:layout_width="match_parent" android:layout_height="match_parent" />
              
              <View android:id="@+id/joystick_base" android:layout_width="180dp" android:layout_height="180dp" android:layout_gravity="bottom|start" android:layout_margin="30dp" android:background="@android:drawable/btn_default_small" android:alpha="0.2"/>

              <RelativeLayout android:layout_width="match_parent" android:layout_height="match_parent">
                  <Button android:id="@+id/btn_start" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="START" android:layout_centerHorizontal="true" android:layout_alignParentBottom="true" android:layout_marginBottom="20dp" android:backgroundTint="#455A64"/>
                  <Button android:id="@+id/btn_b" android:layout_width="75dp" android:layout_height="75dp" android:text="B" android:layout_alignParentBottom="true" android:layout_alignParentEnd="true" android:layout_margin="30dp" android:backgroundTint="#D32F2F"/>
                  <Button android:id="@+id/btn_a" android:layout_width="75dp" android:layout_height="75dp" android:text="A" android:layout_above="@id/btn_b" android:layout_alignParentEnd="true" android:layout_marginEnd="30dp" android:layout_marginBottom="-10dp" android:backgroundTint="#1976D2"/>
              </RelativeLayout>

              <LinearLayout android:id="@+id/start_menu" android:layout_width="220dp" android:layout_height="wrap_content" android:layout_gravity="end|top" android:layout_margin="20dp" android:orientation="vertical" android:background="#F5F5F5" android:padding="15dp" android:elevation="8dp" android:visibility="gone">
                  <Button android:id="@+id/menu_pokedex" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="POKÉDEX" android:textColor="#000" android:backgroundTint="#E0E0E0" android:layout_marginBottom="5dp"/>
                  <Button android:id="@+id/menu_bag" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="BAG" android:textColor="#000" android:backgroundTint="#E0E0E0" android:layout_marginBottom="5dp"/>
                  <Button android:id="@+id/menu_save" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="SAVE" android:textColor="#000" android:backgroundTint="#E0E0E0"/>
              </LinearLayout>
              
              <ListView android:id="@+id/qol_list" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#FFFFFF" android:visibility="gone" />
          </FrameLayout>"""
          create_file("app/src/main/res/layout/activity_main.xml", layout)
          EOF

          # --- 3. ASSETS (Platinum Sprites & Real World Tiles) ---
          cat << 'EOF' > scripts/3-assets.py
          import os, requests, json
          from PIL import Image, ImageDraw
          os.makedirs("app/src/main/assets/sprites", exist_ok=True)
          os.makedirs("app/src/main/assets/tiles", exist_ok=True)
          
          # 1. Fetch High-Quality Decompiled Sprite Sheet (Brendan/Lucas)
          trainer_url = "https://raw.githubusercontent.com/pret/pokeemerald/master/graphics/object_events/pics/people/brendan/normal.png"
          with open("app/src/main/assets/sprites/trainer_sheet.png", 'wb') as f:
              f.write(requests.get(trainer_url).content)
          
          # 2. Fetch Pikachu Follower Sheet
          with open("app/src/main/assets/sprites/follower_sheet.png", 'wb') as f:
              f.write(requests.get("https://raw.githubusercontent.com/pret/pokeemerald/master/graphics/object_events/pics/pokemon/pikachu.png").content)

          # 3. Generate High-Fidelity Sinnoh Tileset (Grass, Path, Tree, House)
          tiles = Image.new("RGBA", (256, 64), (0,0,0,0))
          d = ImageDraw.Draw(tiles)
          d.rectangle([0,0,64,64], fill="#43A047")    # Tile 0: Grass
          d.rectangle([64,0,128,64], fill="#BDBDBD")  # Tile 1: Path
          d.rectangle([128,0,192,64], fill="#5D4037") # Tile 2: House Wall
          d.rectangle([192,0,256,64], fill="#1B5E20") # Tile 3: Solid Tree
          tiles.save("app/src/main/assets/tiles/world_tiles.png")

          # 4. Fetch 151 Pokemon Data for Pokedex
          pkm = []
          for i in range(1, 152):
              pkm.append({"id": i, "name": "Pokemon #"+str(i)}) # Placeholder for speed, can expand with real API calls
          with open("app/src/main/assets/pokedex.json", 'w') as f:
              json.dump(pkm, f)
          EOF

          # --- 4. ENGINE (The Fix + Animated Rendering) ---
          cat << 'EOF' > scripts/4-engine.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)
          java_path = "app/src/main/java/com/genesis/pokemon"

          # 4a. SpriteManager (Caching Engine)
          create_file(f"{java_path}/SpriteManager.java", """package com.genesis.pokemon;
          import android.content.Context;
          import android.graphics.Bitmap;
          import android.graphics.BitmapFactory;
          import java.util.HashMap;
          public class SpriteManager {
              private static HashMap<String, Bitmap> cache = new HashMap<>();
              public static Bitmap get(Context ctx, String name) {
                  if (cache.containsKey(name)) return cache.get(name);
                  try {
                      Bitmap b = BitmapFactory.decodeStream(ctx.getAssets().open(name + ".png"));
                      cache.put(name, b); return b;
                  } catch (Exception e) { return null; }
              }
          }""")

          # 4b. GameView (THE FIX: InputStream Import + Slicing Logic)
          create_file(f"{java_path}/GameView.java", """package com.genesis.pokemon;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.SurfaceView;
          import java.io.InputStream;
          import java.util.LinkedList;

          public class GameView extends SurfaceView implements Runnable {
              private Thread thread;
              private boolean running;
              public float px=128, py=128, vx=0, vy=0;
              private int direction = 0; // 0:Down, 1:Up, 2:Left, 3:Right
              private int animStep = 0, frameCounter = 0;
              private LinkedList<PointF> history = new LinkedList<>();

              // Map (0:Grass, 1:Path, 2:Wall, 3:Tree)
              private int[][] map = {
                  {3,3,3,3,3,3,3,3,3,3},
                  {3,0,0,1,1,2,2,0,0,3},
                  {3,0,0,1,1,1,1,0,0,3},
                  {3,3,3,3,3,3,3,3,3,3}
              };

              public GameView(Context c, AttributeSet a) { super(c, a); }

              @Override public void run() {
                  while (running) {
                      if (!getHolder().getSurface().isValid()) continue;
                      Canvas c = getHolder().lockCanvas();
                      update();
                      drawFrame(c);
                      getHolder().unlockCanvasAndPost(c);
                      try { Thread.sleep(16); } catch (Exception e) {}
                  }
              }

              private void update() {
                  float s = 6;
                  float tx = px, ty = py;
                  
                  // Dominant Axis Snapping (Strict 4-Way)
                  if (Math.abs(vx) > Math.abs(vy)) {
                      if (vx > 0) { tx += s; direction = 3; } else if (vx < 0) { tx -= s; direction = 2; }
                  } else if (vy != 0) {
                      if (vy > 0) { ty += s; direction = 0; } else { ty -= s; direction = 1; }
                  }

                  if (vx != 0 || vy != 0) {
                      frameCounter++;
                      if (frameCounter > 8) { animStep = (animStep + 1) % 3; frameCounter = 0; }
                      
                      // Simple Collision
                      int gx = (int)((tx+32)/64), gy = (int)((ty+32)/64);
                      if (gy >= 0 && gy < map.length && gx >= 0 && gx < map[0].length) {
                          if (map[gy][gx] < 2) { px = tx; py = ty; }
                      }
                      
                      history.addFirst(new PointF(px, py));
                      if (history.size() > 15) history.removeLast();
                  } else { animStep = 1; } // Idle frame
              }

              private void drawFrame(Canvas c) {
                  c.drawColor(Color.BLACK);
                  Bitmap tiles = SpriteManager.get(getContext(), "tiles/world_tiles");
                  if (tiles != null) {
                      for(int y=0; y<map.length; y++) {
                          for(int x=0; x<map[0].length; x++) {
                              int t = map[y][x];
                              Rect src = new Rect(t*64, 0, (t*64)+64, 64);
                              Rect dst = new Rect(x*128, y*128, (x+1)*128, (y+1)*128);
                              c.drawBitmap(tiles, src, dst, null);
                          }
                      }
                  }

                  Bitmap trainer = SpriteManager.get(getContext(), "sprites/trainer_sheet");
                  if (trainer != null) {
                      // Slicing 16x32 frame
                      int sx = animStep * 16, sy = direction * 32;
                      Rect src = new Rect(sx, sy, sx + 16, sy + 32);
                      Rect dst = new Rect((int)px-48, (int)py-96, (int)px+48, (int)py+96);
                      c.drawBitmap(trainer, src, dst, null);
                  }
                  
                  if (history.size() > 12) {
                      Bitmap follower = SpriteManager.get(getContext(), "sprites/follower_sheet");
                      if (follower != null) {
                          PointF f = history.get(12);
                          Rect src = new Rect(animStep*16, direction*16, (animStep*16)+16, (direction*16)+16);
                          Rect dst = new Rect((int)f.x-32, (int)f.y-32, (int)f.x+32, (int)f.y+32);
                          c.drawBitmap(follower, src, dst, null);
                      }
                  }
              }
              public void resume() { running = true; thread = new Thread(this); thread.start(); }
              public void pause() { running = false; }
          }""")
          EOF

          # --- 5. MAIN ACTIVITY (Input & Menu Logic) ---
          cat << 'EOF' > scripts/5-main.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)
          java_path = "app/src/main/java/com/genesis/pokemon"

          create_file(f"{java_path}/MainActivity.java", """package com.genesis.pokemon;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.MotionEvent;
          import android.view.View;
          import android.widget.ArrayAdapter;
          import android.widget.ListView;
          import org.json.JSONArray;
          import java.io.InputStream;
          import java.util.ArrayList;

          public class MainActivity extends Activity {
              private GameView gv;
              private View startMenu;
              private ListView qolList;

              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
                  gv = findViewById(R.id.game_viewport);
                  startMenu = findViewById(R.id.start_menu);
                  qolList = findViewById(R.id.qol_list);

                  findViewById(R.id.joystick_base).setOnTouchListener((v, e) -> {
                      if (e.getAction() == MotionEvent.ACTION_UP) { gv.vx=0; gv.vy=0; }
                      else {
                          gv.vx = e.getX() - (v.getWidth()/2f);
                          gv.vy = e.getY() - (v.getHeight()/2f);
                      }
                      return true;
                  });

                  findViewById(R.id.btn_start).setOnClickListener(v -> {
                      if (startMenu.getVisibility() == View.VISIBLE) {
                          startMenu.setVisibility(View.GONE); gv.resume();
                      } else {
                          startMenu.setVisibility(View.VISIBLE); gv.pause();
                      }
                  });

                  findViewById(R.id.menu_pokedex).setOnClickListener(v -> {
                      startMenu.setVisibility(View.GONE); qolList.setVisibility(View.VISIBLE);
                      ArrayList<String> n = new ArrayList<>();
                      try {
                          InputStream is = getAssets().open("pokedex.json");
                          byte[] buf = new byte[is.available()]; is.read(buf);
                          JSONArray arr = new JSONArray(new String(buf));
                          for(int i=0; i<arr.length(); i++) n.add(arr.getJSONObject(i).getString("name"));
                      } catch (Exception ex) {}
                      qolList.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_list_item_1, n));
                  });

                  qolList.setOnItemClickListener((parent, view, position, id) -> {
                      qolList.setVisibility(View.GONE); gv.resume();
                  });
              }
              @Override protected void onResume() { super.onResume(); gv.resume(); }
          }""")
          EOF

      - name: Build APK (Pinned Gradle 8.7)
        run: |
          cd MyPokemonGame
          python scripts/1-scaffold.py
          python scripts/2-ui.py
          python scripts/3-assets.py
          python scripts/4-engine.py
          python scripts/5-main.py
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Platinum-Zenith-APK
          path: MyPokemonGame/app/build/outputs/apk/debug/app-debug.apk
