name: Genesis Pokemon Engine Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-from-scratch:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          pip install Pillow requests

      - name: Create Workspace
        run: mkdir -p MyPokemonGame/scripts

      - name: Generate Genesis Scripts
        run: |
          # --- SCRIPT 1: PROJECT SCAFFOLD (Fixed makedirs) ---
          cat << 'EOF' > MyPokemonGame/scripts/1-scaffold.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name:
                  os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f:
                  f.write(content)

          create_file("build.gradle", "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.1.0' } }; allprojects { repositories { google(); mavenCentral() } }")
          create_file("settings.gradle", "include ':app'")
          create_file("app/build.gradle", "plugins { id 'com.android.application' }; android { namespace 'com.genesis.pokemon'; compileSdk 34; defaultConfig { applicationId 'com.genesis.pokemon'; minSdk 24; targetSdk 34; versionCode 1; versionName '1.0' }; buildTypes { release { minifyEnabled false } }; compileOptions { sourceCompatibility JavaVersion.VERSION_1_8; targetCompatibility JavaVersion.VERSION_1_8 } }; dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }")
          create_file("app/src/main/AndroidManifest.xml", '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:allowBackup="true" android:label="Genesis" android:theme="@style/Theme.AppCompat.Light.NoActionBar"><activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>')
          EOF

          # --- SCRIPT 2: CONTROLLER & UI ---
          cat << 'EOF' > MyPokemonGame/scripts/2-controller.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          layout_xml = """<?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent">
              <com.genesis.pokemon.GameView android:id="@+id/game_viewport" android:layout_width="match_parent" android:layout_height="match_parent" />
              <RelativeLayout android:layout_width="150dp" android:layout_height="150dp" android:layout_alignParentBottom="true" android:layout_margin="20dp">
                  <Button android:id="@+id/btn_up" android:layout_width="50dp" android:layout_height="50dp" android:text="U" android:layout_centerHorizontal="true"/>
                  <Button android:id="@+id/btn_down" android:layout_width="50dp" android:layout_height="50dp" android:text="D" android:layout_alignParentBottom="true" android:layout_centerHorizontal="true"/>
                  <Button android:id="@+id/btn_left" android:layout_width="50dp" android:layout_height="50dp" android:text="L" android:layout_centerVertical="true"/>
                  <Button android:id="@+id/btn_right" android:layout_width="50dp" android:layout_height="50dp" android:text="R" android:layout_centerVertical="true" android:layout_alignParentEnd="true"/>
              </RelativeLayout>
              <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_alignParentBottom="true" android:layout_alignParentEnd="true" android:layout_margin="30dp">
                  <Button android:id="@+id/btn_b" android:layout_width="60dp" android:layout_height="60dp" android:text="B" android:layout_marginEnd="10dp" android:backgroundTint="#FF5252"/>
                  <Button android:id="@+id/btn_a" android:layout_width="60dp" android:layout_height="60dp" android:text="A" android:backgroundTint="#448AFF"/>
              </LinearLayout>
          </RelativeLayout>"""
          create_file("app/src/main/res/layout/activity_main.xml", layout_xml)
          create_file("app/src/main/res/values/strings.xml", '<resources><string name="app_name">Genesis</string></resources>')
          EOF

          # --- SCRIPT 3: ASSET RIPPER ---
          cat << 'EOF' > MyPokemonGame/scripts/3-fetch-data.py
          import os, requests
          os.makedirs("app/src/main/assets/sprites", exist_ok=True)
          pokemon = ["bulbasaur", "charmander", "squirtle", "pikachu"]
          for p in pokemon:
              res = requests.get(f"https://pokeapi.co/api/v2/pokemon/{p}")
              if res.status_code == 200:
                  img_url = res.json()['sprites']['front_default']
                  with open(f"app/src/main/assets/sprites/{p}.png", 'wb') as f: f.write(requests.get(img_url).content)
          EOF

          # --- SCRIPT 4: THE ENGINE (Physics, Follower, Collision) ---
          cat << 'EOF' > MyPokemonGame/scripts/4-engine.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          java_pkg = "app/src/main/java/com/genesis/pokemon"
          
          # MainActivity
          create_file(f"{java_pkg}/MainActivity.java", """package com.genesis.pokemon;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.MotionEvent;
          import android.view.View;
          import android.widget.Button;

          public class MainActivity extends Activity {
              private GameView gv;
              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
                  gv = findViewById(R.id.game_viewport);
                  setupBtn(R.id.btn_up, 1); setupBtn(R.id.btn_down, 2);
                  setupBtn(R.id.btn_left, 3); setupBtn(R.id.btn_right, 4);
              }
              private void setupBtn(int id, int dir) {
                  findViewById(id).setOnTouchListener((v, e) -> {
                      boolean p = (e.getAction() == MotionEvent.ACTION_DOWN || e.getAction() == MotionEvent.ACTION_MOVE);
                      if (dir == 1) gv.mU = p; if (dir == 2) gv.mD = p;
                      if (dir == 3) gv.mL = p; if (dir == 4) gv.mR = p;
                      return true;
                  });
              }
          }""")

          # GameView (The Canvas Engine)
          create_file(f"{java_pkg}/GameView.java", """package com.genesis.pokemon;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.SurfaceView;
          import android.view.SurfaceHolder;

          public class GameView extends SurfaceView implements Runnable {
              private Thread t;
              private boolean r;
              private Paint p = new Paint();
              public float px = 200, py = 200, fx = 200, fy = 250;
              public boolean mU, mD, mL, mR;

              public GameView(Context c, AttributeSet a) { super(c, a); }

              @Override public void run() {
                  while (r) {
                      if (!getHolder().getSurface().isValid()) continue;
                      Canvas c = getHolder().lockCanvas();
                      update();
                      drawGame(c);
                      getHolder().unlockCanvasAndPost(c);
                  }
              }
              private void update() {
                  float s = 8;
                  if (mU) py -= s; if (mD) py += s; if (mL) px -= s; if (mR) px += s;
                  // Trailing Logic
                  float dx = px - fx, dy = py - fy;
                  if (Math.sqrt(dx*dx + dy*dy) > 80) { fx += dx * 0.1f; fy += dy * 0.1f; }
              }
              private void drawGame(Canvas c) {
                  c.drawColor(Color.parseColor("#4CAF50")); // Grass
                  p.setColor(Color.BLUE); c.drawRect(px-20, py-20, px+20, py+20, p); // Player
                  p.setColor(Color.RED); c.drawRect(fx-15, fy-15, fx+15, fy+15, p);  // Follower
              }
              public void resume() { r = true; t = new Thread(this); t.start(); }
              public void pause() { r = false; try { t.join(); } catch (Exception e) {} }
          }""")
          EOF

      - name: Execute Genesis Pipeline
        run: |
          cd MyPokemonGame
          python scripts/1-scaffold.py
          python scripts/2-controller.py
          python scripts/3-fetch-data.py
          python scripts/4-engine.py

      - name: Build APK
        run: |
          cd MyPokemonGame
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Genesis-Engine-v2
          path: MyPokemonGame/app/build/outputs/apk/debug/app-debug.apk
