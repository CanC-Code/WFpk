name: Genesis 3.0 - Full Pokemon Engine

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Build Tools
        run: pip install Pillow requests

      - name: Initialize Project Workspace
        run: mkdir -p MyPokemonGame/scripts

      - name: Genesis Factory Execution
        run: |
          cd MyPokemonGame
          
          # --- SCRIPT 1: SYSTEM SCAFFOLDING ---
          cat << 'EOF' > scripts/1-scaffold.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          # Gradle and Manifest
          create_file("build.gradle", "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.1.0' } }; allprojects { repositories { google(); mavenCentral() } }")
          create_file("settings.gradle", "include ':app'")
          create_file("app/build.gradle", "plugins { id 'com.android.application' }; android { namespace 'com.genesis.pokemon'; compileSdk 34; defaultConfig { applicationId 'com.genesis.pokemon'; minSdk 24; targetSdk 34; versionCode 1; versionName '1.0' }; buildTypes { release { minifyEnabled false } }; compileOptions { sourceCompatibility JavaVersion.VERSION_1_8; targetCompatibility JavaVersion.VERSION_1_8 } }; dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.9.0' }")
          create_file("app/src/main/AndroidManifest.xml", '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="Genesis 3.0" android:theme="@style/Theme.Material3.DayNight.NoActionBar"><activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity><activity android:name=".PokedexActivity" android:screenOrientation="portrait"/></application></manifest>')
          EOF

          # --- SCRIPT 2: UI & CONTROLLER (A/B/Start/Select) ---
          cat << 'EOF' > scripts/2-ui.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          layout = """<?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000000">
              <com.genesis.pokemon.GameView android:id="@+id/game_viewport" android:layout_width="match_parent" android:layout_height="match_parent" />
              <GridLayout android:layout_width="150dp" android:layout_height="150dp" android:layout_alignParentBottom="true" android:columnCount="3" android:rowCount="3" android:layout_margin="10dp">
                  <View android:layout_width="50dp" android:layout_height="50dp"/> <Button android:id="@+id/btn_up" android:layout_width="50dp" android:layout_height="50dp" android:text="▲"/> <View android:layout_width="50dp" android:layout_height="50dp"/>
                  <Button android:id="@+id/btn_left" android:layout_width="50dp" android:layout_height="50dp" android:text="◀"/> <View android:layout_width="50dp" android:layout_height="50dp"/> <Button android:id="@+id/btn_right" android:layout_width="50dp" android:layout_height="50dp" android:text="▶"/>
                  <View android:layout_width="50dp" android:layout_height="50dp"/> <Button android:id="@+id/btn_down" android:layout_width="50dp" android:layout_height="50dp" android:text="▼"/> <View android:layout_width="50dp" android:layout_height="50dp"/>
              </GridLayout>
              <RelativeLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_alignParentBottom="true" android:layout_alignParentEnd="true" android:layout_margin="20dp">
                  <Button android:id="@+id/btn_b" android:layout_width="70dp" android:layout_height="70dp" android:text="B" android:backgroundTint="#F44336" android:layout_marginEnd="80dp"/>
                  <Button android:id="@+id/btn_a" android:layout_width="70dp" android:layout_height="70dp" android:text="A" android:backgroundTint="#2196F3" android:layout_toEndOf="@id/btn_b" android:layout_marginTop="-20dp"/>
              </RelativeLayout>
              <Button android:id="@+id/btn_start" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="MENU" android:layout_centerHorizontal="true" android:layout_alignParentBottom="true" android:layout_marginBottom="10dp" android:backgroundTint="#757575" android:textSize="10sp"/>
          </RelativeLayout>"""
          create_file("app/src/main/res/layout/activity_main.xml", layout)
          EOF

          # --- SCRIPT 3: MULTITHREADED ASSET RIPPER ---
          cat << 'EOF' > scripts/3-assets.py
          import os, requests, json
          from concurrent.futures import ThreadPoolExecutor

          os.makedirs("app/src/main/assets/sprites", exist_ok=True)
          os.makedirs("app/src/main/assets/sounds", exist_ok=True)
          pokedex_data = []

          def fetch_pokemon(p_id):
              try:
                  res = requests.get(f"https://pokeapi.co/api/v2/pokemon/{p_id}", timeout=10).json()
                  name = res['name']
                  # Download Sprite
                  img_data = requests.get(res['sprites']['front_default']).content
                  with open(f"app/src/main/assets/sprites/{name}.png", 'wb') as f: f.write(img_data)
                  # Data for Pokedex
                  return {"id": p_id, "name": name.capitalize(), "hp": res['stats'][0]['base_stat'], "atk": res['stats'][1]['base_stat']}
              except: return None

          print("Ripping 151 Pokemon...")
          with ThreadPoolExecutor(max_workers=10) as ex:
              pokedex_data = list(filter(None, ex.map(fetch_pokemon, range(1, 152))))
          
          with open("app/src/main/assets/pokedex.json", 'w') as f: json.dump(pokedex_data, f)
          EOF

          # --- SCRIPT 4: CORE ENGINE (Grid, Following, Rustle) ---
          cat << 'EOF' > scripts/4-engine.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          java_path = "app/src/main/java/com/genesis/pokemon"
          
          create_file(f"{java_path}/GameView.java", """package com.genesis.pokemon;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.SurfaceView;
          import java.util.LinkedList;

          public class GameView extends SurfaceView implements Runnable {
              private Thread thread;
              private boolean running;
              public float px = 64, py = 64; // Player (Grid units)
              public float fx = 64, fy = 128; // Follower
              public boolean mU, mD, mL, mR;
              private LinkedList<PointF> history = new LinkedList<>();

              public GameView(Context c, AttributeSet a) { super(c, a); }

              @Override public void run() {
                  while (running) {
                      if (!getHolder().getSurface().isValid()) continue;
                      Canvas canvas = getHolder().lockCanvas();
                      update();
                      drawFrame(canvas);
                      getHolder().unlockCanvasAndPost(canvas);
                      try { Thread.sleep(16); } catch (Exception e) {}
                  }
              }

              private void update() {
                  float speed = 4;
                  float oldX = px, oldY = py;
                  if (mU) py -= speed; if (mD) py += speed;
                  if (mL) px -= speed; if (mR) px += speed;

                  if (px != oldX || py != oldY) {
                      history.addFirst(new PointF(px, py));
                      if (history.size() > 20) {
                          PointF last = history.removeLast();
                          fx = last.x; fy = last.y;
                      }
                  }
              }

              private void drawFrame(Canvas c) {
                  c.drawColor(Color.parseColor("#388E3C")); // Grass
                  Paint p = new Paint();
                  // Draw Rustling Grass (Simple Circles)
                  p.setColor(Color.parseColor("#2E7D32"));
                  for(int i=0; i<20; i++) for(int j=0; j<20; j++) c.drawCircle(i*100, j*100, 10, p);
                  
                  p.setColor(Color.WHITE);
                  c.drawRect(px-32, py-32, px+32, py+32, p); // Player
                  p.setColor(Color.YELLOW);
                  c.drawCircle(fx, fy, 20, p); // Follower
              }
              
              public void resume() { running = true; thread = new Thread(this); thread.start(); }
              public void pause() { running = false; }
          }""")
          
          create_file(f"{java_pkg}/MainActivity.java", """package com.genesis.pokemon;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.MotionEvent;
          public class MainActivity extends Activity {
              private GameView gv;
              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
                  gv = findViewById(R.id.game_viewport);
                  bind(R.id.btn_up, 1); bind(R.id.btn_down, 2);
                  bind(R.id.btn_left, 3); bind(R.id.btn_right, 4);
              }
              private void bind(int id, int d) {
                  findViewById(id).setOnTouchListener((v, e) -> {
                      boolean p = e.getAction() == MotionEvent.ACTION_DOWN || e.getAction() == MotionEvent.ACTION_MOVE;
                      if (d==1) gv.mU=p; if (d==2) gv.mD=p; if (d==3) gv.mL=p; if (d==4) gv.mR=p;
                      return true;
                  });
              }
              @Override protected void onResume() { super.onResume(); gv.resume(); }
          }""")
          EOF

          # Execute Pipeline
          python scripts/1-scaffold.py
          python scripts/2-ui.py
          python scripts/3-assets.py
          python scripts/4-engine.py

      - name: Assemble APK
        run: |
          cd MyPokemonGame
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Archive Genesis APK
        uses: actions/upload-artifact@v4
        with:
          name: Genesis-3.0-Build
          path: MyPokemonGame/app/build/outputs/apk/debug/app-debug.apk
