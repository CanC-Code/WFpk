name: Genesis 9.0 - Complete World Engine

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: pip install Pillow requests

      - name: Initialize Workspace
        run: mkdir -p MyPokemonGame/scripts

      - name: Generate Genesis Scripts
        run: |
          cd MyPokemonGame
          
          # --- SCRIPT 1: STABLE SCAFFOLD ---
          cat << 'EOF' > scripts/1-scaffold.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          create_file("build.gradle", "plugins { id 'com.android.application' version '8.4.0' apply false }")
          create_file("settings.gradle", "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }; dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }; include ':app'")
          create_file("gradle.properties", "android.useAndroidX=true\nandroid.enableJetifier=true")
          create_file("app/build.gradle", "plugins { id 'com.android.application' }; android { namespace 'com.genesis.pokemon'; compileSdk 34; defaultConfig { applicationId 'com.genesis.pokemon'; minSdk 24; targetSdk 34; versionCode 1; versionName '3.0' }; buildTypes { release { minifyEnabled false } }; compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 } }; dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.9.0' }")
          create_file("app/src/main/AndroidManifest.xml", '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="Genesis 9.0" android:theme="@style/Theme.Material3.DayNight.NoActionBar"><activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>')
          EOF

          # --- SCRIPT 2: UNIFIED QOL UI ---
          cat << 'EOF' > scripts/2-ui.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          layout = """<?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#121212">
              
              <com.genesis.pokemon.GameView android:id="@+id/game_viewport" android:layout_width="match_parent" android:layout_height="match_parent" />
              
              <View android:id="@+id/joystick_base" android:layout_width="200dp" android:layout_height="200dp" android:layout_gravity="bottom|start" android:layout_margin="20dp" android:background="@android:drawable/btn_default_small" android:alpha="0.2"/>

              <RelativeLayout android:layout_width="160dp" android:layout_height="100dp" android:layout_gravity="bottom|end" android:layout_margin="30dp">
                  <Button android:id="@+id/btn_b" android:layout_width="70dp" android:layout_height="70dp" android:text="B" android:backgroundTint="#F44336" android:layout_alignParentBottom="true"/>
                  <Button android:id="@+id/btn_a" android:layout_width="70dp" android:layout_height="70dp" android:text="A" android:backgroundTint="#2196F3" android:layout_alignParentEnd="true" android:layout_alignParentTop="true"/>
              </RelativeLayout>
              <Button android:id="@+id/btn_start" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="START" android:layout_gravity="bottom|center_horizontal" android:layout_marginBottom="20dp" android:backgroundTint="#424242"/>

              <LinearLayout android:id="@+id/start_menu" android:layout_width="220dp" android:layout_height="wrap_content" android:layout_gravity="end|top" android:layout_margin="20dp" android:orientation="vertical" android:background="#FAFAFA" android:padding="12dp" android:elevation="10dp" android:visibility="gone">
                  <TextView android:layout_width="match_parent" android:layout_height="wrap_content" android:text="MENU" android:textStyle="bold" android:textSize="18sp" android:layout_marginBottom="10dp" android:textColor="#000000"/>
                  <Button android:id="@+id/menu_pokedex" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="POKÉDEX" android:backgroundTint="#E0E0E0" android:textColor="#000"/>
                  <Button android:id="@+id/menu_pokemon" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="POKÉMON" android:backgroundTint="#E0E0E0" android:textColor="#000"/>
                  <Button android:id="@+id/menu_bag" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="BAG" android:backgroundTint="#E0E0E0" android:textColor="#000"/>
                  <Button android:id="@+id/menu_save" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="SAVE" android:backgroundTint="#E0E0E0" android:textColor="#000"/>
                  <Button android:id="@+id/menu_settings" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="SETTINGS" android:backgroundTint="#E0E0E0" android:textColor="#000"/>
              </LinearLayout>
              
              <ListView android:id="@+id/qol_list" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#FFFFFF" android:visibility="gone" />
          </FrameLayout>"""
          create_file("app/src/main/res/layout/activity_main.xml", layout)
          EOF

          # --- SCRIPT 3: FETCH AUTHENTIC ASSETS (Decomp & PokeAPI) ---
          cat << 'EOF' > scripts/3-assets.py
          import os, requests, json
          from PIL import Image, ImageDraw
          from concurrent.futures import ThreadPoolExecutor

          os.makedirs("app/src/main/assets/sprites", exist_ok=True)
          os.makedirs("app/src/main/assets/tiles", exist_ok=True)
          os.makedirs("app/src/main/assets/sounds", exist_ok=True)

          base_pret = "https://raw.githubusercontent.com/pret/pokeemerald/master/graphics/object_events/pics/"
          
          # 1. Fetch Real Sprite Sheets
          with open("app/src/main/assets/sprites/trainer.png", 'wb') as f: 
              f.write(requests.get(base_pret + "people/brendan/normal.png").content)
          with open("app/src/main/assets/sprites/follower.png", 'wb') as f: 
              f.write(requests.get(base_pret + "pokemon/pikachu.png").content)

          # 2. Generate Stylized World Tiles (Grass, Path, House, PokeCenter, Tree)
          tileset = Image.new("RGBA", (320, 64), (0,0,0,0))
          d = ImageDraw.Draw(tileset)
          d.rectangle([0,0,64,64], fill="#8BC34A")    # 0: Grass
          d.rectangle([64,0,128,64], fill="#D7CCC8")  # 1: Path
          d.rectangle([128,0,192,64], fill="#FFCC80") # 2: House
          d.rectangle([192,0,256,64], fill="#F44336") # 3: PokeCenter
          d.rectangle([256,0,320,64], fill="#2E7D32") # 4: Solid Tree
          tileset.save("app/src/main/assets/tiles/world_tiles.png")

          # 3. Dynamic PokeAPI Fetch (151 Pokemon + Cries)
          pokedex = []
          def fetch_data(i):
              try:
                  res = requests.get(f"https://pokeapi.co/api/v2/pokemon/{i}", timeout=5).json()
                  name = res['name']
                  # Save Front Sprite for Battles/Pokedex
                  img = requests.get(res['sprites']['front_default']).content
                  with open(f"app/src/main/assets/sprites/{name}_front.png", 'wb') as f: f.write(img)
                  return {"id": i, "name": name.capitalize(), "hp": res['stats'][0]['base_stat'], "type": res['types'][0]['type']['name']}
              except: return None

          print("Fetching 151 Pokemon Data & Sprites...")
          with ThreadPoolExecutor(max_workers=15) as ex:
              pokedex = list(filter(None, ex.map(fetch_data, range(1, 152))))
          with open("app/src/main/assets/pokedex.json", 'w') as f: json.dump(pokedex, f)
          EOF

          # --- SCRIPT 4: THE ENGINE (Strict Drag, Sprite Slicing, Town Logic) ---
          cat << 'EOF' > scripts/4-engine.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          java_path = "app/src/main/java/com/genesis/pokemon"

          create_file(f"{java_path}/AssetManager.java", """package com.genesis.pokemon;
          import android.content.Context;
          import android.graphics.Bitmap;
          import android.graphics.BitmapFactory;
          import java.util.HashMap;
          public class AssetManager {
              private static HashMap<String, Bitmap> cache = new HashMap<>();
              public static Bitmap get(Context ctx, String type, String name) {
                  String key = type + "_" + name;
                  if (cache.containsKey(key)) return cache.get(key);
                  try {
                      Bitmap b = BitmapFactory.decodeStream(ctx.getAssets().open(type + "/" + name + ".png"));
                      cache.put(key, b); return b;
                  } catch (Exception e) { return null; }
              }
          }""")

          create_file(f"{java_path}/GameView.java", """package com.genesis.pokemon;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.SurfaceView;
          import java.util.LinkedList;

          public class GameView extends SurfaceView implements Runnable {
              private Thread thread;
              public boolean r;
              public float px=128, py=128; // Grid X,Y
              public float vx=0, vy=0;
              public int direction = 0; // 0=Down, 1=Up, 2=Left, 3=Right
              
              private int frameCounter = 0;
              private int animStep = 0; // 0, 1, 2 frames
              private LinkedList<PointF> history = new LinkedList<>();

              // Town Map (0=Grass, 1=Path, 2=House, 3=PokeCenter, 4=Tree)
              private int[][] map = {
                  {4,4,4,4,4,4,4,4,4,4},
                  {4,0,0,1,1,3,3,0,0,4},
                  {4,0,2,1,1,1,1,0,0,4},
                  {4,0,0,1,1,0,0,0,0,4},
                  {4,4,4,4,4,4,4,4,4,4}
              };

              public GameView(Context c, AttributeSet a) { super(c, a); }

              @Override public void run() {
                  while (r) {
                      if (!getHolder().getSurface().isValid()) continue;
                      Canvas c = getHolder().lockCanvas();
                      update();
                      drawGame(c);
                      getHolder().unlockCanvasAndPost(c);
                      try { Thread.sleep(16); } catch (Exception e) {}
                  }
              }

              private void update() {
                  float s = 6; float tx = px, ty = py;
                  
                  // STRICT 4-WAY DRAG MATH
                  if (vx != 0 || vy != 0) {
                      if (Math.abs(vx) > Math.abs(vy)) {
                          if (vx > 0) { tx += s; direction = 3; } else { tx -= s; direction = 2; }
                      } else {
                          if (vy > 0) { ty += s; direction = 0; } else { ty -= s; direction = 1; }
                      }
                      frameCounter++;
                      if (frameCounter > 8) { animStep = (animStep + 1) % 3; frameCounter = 0; }
                  } else { animStep = 1; } // Standing still

                  // Collision (Tile=64px). 2,3,4 are solid buildings/trees
                  int gX = (int)((tx+32) / 64), gY = (int)((ty+32) / 64);
                  if (gY >= 0 && gY < map.length && gX >= 0 && gX < map[0].length) {
                      int tile = map[gY][gX];
                      if (tile < 2) { px = tx; py = ty; }
                  }

                  if (vx != 0 || vy != 0) {
                      history.addFirst(new PointF(px, py));
                      if (history.size() > 16) history.removeLast();
                  }
              }

              private void drawGame(Canvas c) {
                  c.drawColor(Color.BLACK);
                  Bitmap tiles = AssetManager.get(getContext(), "tiles", "world_tiles");
                  if (tiles != null) {
                      for (int y=0; y<map.length; y++) {
                          for (int x=0; x<map[0].length; x++) {
                              int tileIdx = map[y][x];
                              Rect src = new Rect(tileIdx*64, 0, (tileIdx*64)+64, 64);
                              Rect dst = new Rect(x*64, y*64, (x+1)*64, (y+1)*64);
                              c.drawBitmap(tiles, src, dst, null);
                          }
                      }
                  }

                  // SLICE AUTHENTIC TRAINER SPRITE (16x32 frame scaled to 64x128)
                  Bitmap trainer = AssetManager.get(getContext(), "sprites", "trainer");
                  if (trainer != null) {
                      int sX = animStep * 16, sY = direction * 32;
                      Rect src = new Rect(sX, sY, sX + 16, sY + 32);
                      Rect dst = new Rect((int)px - 32, (int)py - 64, (int)px + 32, (int)py + 64);
                      c.drawBitmap(trainer, src, dst, null);
                  }
                  
                  // SLICE FOLLOWER SPRITE (16x16 frame scaled to 64x64)
                  Bitmap follower = AssetManager.get(getContext(), "sprites", "follower");
                  if (follower != null && history.size() > 15) {
                      PointF fPos = history.get(15);
                      int sX = animStep * 16, sY = direction * 16;
                      Rect src = new Rect(sX, sY, sX + 16, sY + 16);
                      Rect dst = new Rect((int)fPos.x - 32, (int)fPos.y - 32, (int)fPos.x + 32, (int)fPos.y + 32);
                      c.drawBitmap(follower, src, dst, null);
                  }
              }
              public void resume() { r = true; thread = new Thread(this); thread.start(); }
              public void pause() { r = false; }
          }""")
          EOF

          # --- SCRIPT 5: UNIFIED QOL MENU MANAGER ---
          cat << 'EOF' > scripts/5-main.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          java_path = "app/src/main/java/com/genesis/pokemon"

          create_file(f"{java_path}/MainActivity.java", """package com.genesis.pokemon;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.MotionEvent;
          import android.view.View;
          import android.widget.ArrayAdapter;
          import android.widget.ListView;
          import android.widget.Toast;
          import org.json.JSONArray;
          import java.io.InputStream;
          import java.util.ArrayList;

          public class MainActivity extends Activity {
              private GameView gv;
              private View startMenu;
              private ListView qolList;

              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
                  gv = findViewById(R.id.game_viewport);
                  startMenu = findViewById(R.id.start_menu);
                  qolList = findViewById(R.id.qol_list);

                  // TRUE DRAGGABLE ANALOG JOYSTICK
                  findViewById(R.id.joystick_base).setOnTouchListener((v, e) -> {
                      if (e.getAction() == MotionEvent.ACTION_UP) { 
                          gv.vx = 0; gv.vy = 0; 
                      } else {
                          float dx = e.getX() - (v.getWidth()/2f), dy = e.getY() - (v.getHeight()/2f);
                          gv.vx = dx; gv.vy = dy; // GameView handles strict 4-way snapping
                      }
                      return true;
                  });

                  // MENU TOGGLE
                  findViewById(R.id.btn_start).setOnClickListener(v -> {
                      if (startMenu.getVisibility() == View.VISIBLE) {
                          startMenu.setVisibility(View.GONE); gv.resume();
                      } else {
                          startMenu.setVisibility(View.VISIBLE); gv.pause();
                      }
                  });

                  // QOL: POKEDEX
                  findViewById(R.id.menu_pokedex).setOnClickListener(v -> {
                      startMenu.setVisibility(View.GONE); qolList.setVisibility(View.VISIBLE);
                      ArrayList<String> entries = new ArrayList<>();
                      try {
                          InputStream is = getAssets().open("pokedex.json");
                          byte[] buf = new byte[is.available()]; is.read(buf);
                          JSONArray arr = new JSONArray(new String(buf));
                          for(int i=0; i<arr.length(); i++) {
                              entries.add("#" + arr.getJSONObject(i).getInt("id") + " " + arr.getJSONObject(i).getString("name") + " [" + arr.getJSONObject(i).getString("type").toUpperCase() + "]");
                          }
                      } catch (Exception ex) { entries.add("Pokedex Data Missing."); }
                      qolList.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_list_item_1, entries));
                  });

                  // QOL: BAG
                  findViewById(R.id.menu_bag).setOnClickListener(v -> {
                      startMenu.setVisibility(View.GONE); qolList.setVisibility(View.VISIBLE);
                      ArrayList<String> bag = new ArrayList<>();
                      bag.add("Poké Ball x10"); bag.add("Potion x5"); bag.add("Escape Rope x1");
                      qolList.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_list_item_1, bag));
                  });

                  // QOL: SAVE
                  findViewById(R.id.menu_save).setOnClickListener(v -> {
                      Toast.makeText(this, "Game Saved! (px: " + gv.px + ", py: " + gv.py + ")", Toast.LENGTH_SHORT).show();
                      startMenu.setVisibility(View.GONE); gv.resume();
                  });

                  qolList.setOnItemClickListener((parent, view, position, id) -> {
                      qolList.setVisibility(View.GONE); gv.resume();
                  });
              }
              @Override protected void onResume() { super.onResume(); gv.resume(); }
              @Override protected void onPause() { super.onPause(); gv.pause(); }
          }""")
          EOF

      - name: Execute Genesis Pipeline
        run: |
          cd MyPokemonGame
          python scripts/1-scaffold.py
          python scripts/2-ui.py
          python scripts/3-assets.py
          python scripts/4-engine.py
          python scripts/5-main.py

      - name: Build APK (Pinned Gradle 8.7)
        run: |
          cd MyPokemonGame
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Genesis-9.0-APK
          path: MyPokemonGame/app/build/outputs/apk/debug/app-debug.apk
