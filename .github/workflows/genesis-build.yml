      - name: Generate Genesis Scripts
        run: |
          cd MyPokemonGame
          # --- SCRIPT 1: SYSTEM SCAFFOLDING ---
          cat << 'EOF' > scripts/1-scaffold.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          create_file("app/build.gradle", "plugins { id 'com.android.application' }; android { namespace 'com.genesis.pokemon'; compileSdk 34; defaultConfig { applicationId 'com.genesis.pokemon'; minSdk 24; targetSdk 34; versionCode 1; versionName '1.0' }; buildTypes { release { minifyEnabled false } } }; dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.9.0' }")
          create_file("app/src/main/AndroidManifest.xml", '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="Genesis 4.0" android:theme="@style/Theme.Material3.DayNight.NoActionBar"><activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity><activity android:name=".PokedexActivity" android:screenOrientation="portrait"/></application></manifest>')
          create_file("build.gradle", "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.1.0' } }; allprojects { repositories { google(); mavenCentral() } }")
          create_file("settings.gradle", "include ':app'")
          EOF

          # --- SCRIPT 2: UI & POKEDEX LAYOUT ---
          cat << 'EOF' > scripts/2-ui.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          # Main Game Layout
          create_file("app/src/main/res/layout/activity_main.xml", """<?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent">
              <com.genesis.pokemon.GameView android:id="@+id/game_viewport" android:layout_width="match_parent" android:layout_height="match_parent" />
              <GridLayout android:layout_width="150dp" android:layout_height="150dp" android:layout_alignParentBottom="true" android:columnCount="3" android:rowCount="3" android:layout_margin="10dp">
                  <View android:layout_width="50dp" android:layout_height="50dp"/> <Button android:id="@+id/btn_up" android:layout_width="50dp" android:layout_height="50dp" android:text="U"/> <View android:layout_width="50dp" android:layout_height="50dp"/>
                  <Button android:id="@+id/btn_left" android:layout_width="50dp" android:layout_height="50dp" android:text="L"/> <View android:layout_width="50dp" android:layout_height="50dp"/> <Button android:id="@+id/btn_right" android:layout_width="50dp" android:layout_height="50dp" android:text="R"/>
                  <View android:layout_width="50dp" android:layout_height="50dp"/> <Button android:id="@+id/btn_down" android:layout_width="50dp" android:layout_height="50dp" android:text="D"/> <View android:layout_width="50dp" android:layout_height="50dp"/>
              </GridLayout>
              <Button android:id="@+id/btn_a" android:layout_width="70dp" android:layout_height="70dp" android:text="A" android:layout_alignParentBottom="true" android:layout_alignParentEnd="true" android:layout_margin="20dp" android:backgroundTint="#2196F3"/>
          </RelativeLayout>""")
          EOF

          # --- SCRIPT 3: ASSET RIPPER (High Robustness) ---
          cat << 'EOF' > scripts/3-assets.py
          import os, requests, json
          from concurrent.futures import ThreadPoolExecutor

          os.makedirs("app/src/main/assets/sprites", exist_ok=True)
          pokedex = []

          def fetch(p_id):
              try:
                  data = requests.get(f"https://pokeapi.co/api/v2/pokemon/{p_id}", timeout=10).json()
                  name = data['name']
                  img = requests.get(data['sprites']['front_default']).content
                  with open(f"app/src/main/assets/sprites/{name}.png", 'wb') as f: f.write(img)
                  return {"id": p_id, "name": name.capitalize(), "hp": data['stats'][0]['base_stat']}
              except: return None

          with ThreadPoolExecutor(max_workers=15) as ex:
              pokedex = list(filter(None, ex.map(fetch, range(1, 152))))
          with open("app/src/main/assets/pokedex.json", 'w') as f: json.dump(pokedex, f)
          EOF

          # --- SCRIPT 4: THE CORE ENGINE (Fixes NameError + Adds Real Sprites) ---
          cat << 'EOF' > scripts/4-engine.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          java_pkg = "app/src/main/java/com/genesis/pokemon" # Fixed variable name

          # GameView.java (Real Graphics Engine)
          create_file(f"{java_pkg}/GameView.java", """package com.genesis.pokemon;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.SurfaceView;
          import java.io.InputStream;
          import java.util.LinkedList;

          public class GameView extends SurfaceView implements Runnable {
              private Thread thread;
              private boolean running;
              private Bitmap playerBmp, followerBmp, treeBmp;
              public float px = 100, py = 100, fx = 100, fy = 150;
              public boolean mU, mD, mL, mR;
              private LinkedList<PointF> trail = new LinkedList<>();

              public GameView(Context c, AttributeSet a) {
                  super(c, a);
                  loadAssets();
              }

              private void loadAssets() {
                  try {
                      InputStream is = getContext().getAssets().open("sprites/pikachu.png");
                      playerBmp = Bitmap.createScaledBitmap(BitmapFactory.decodeStream(is), 128, 128, false);
                      is = getContext().getAssets().open("sprites/bulbasaur.png");
                      followerBmp = Bitmap.createScaledBitmap(BitmapFactory.decodeStream(is), 100, 100, false);
                  } catch (Exception e) {}
              }

              @Override public void run() {
                  while (running) {
                      if (!getHolder().getSurface().isValid()) continue;
                      Canvas canvas = getHolder().lockCanvas();
                      update();
                      render(canvas);
                      getHolder().unlockCanvasAndPost(canvas);
                  }
              }

              private void update() {
                  float s = 10;
                  float ox = px, oy = py;
                  if (mU) py -= s; if (mD) py += s; if (mL) px -= s; if (mR) px += s;
                  
                  // Trailing Logic (HeartGold style)
                  if (px != ox || py != oy) {
                      trail.addFirst(new PointF(px, py));
                      if (trail.size() > 15) {
                          PointF p = trail.removeLast();
                          fx = p.x; fy = p.y;
                      }
                  }
              }

              private void render(Canvas c) {
                  c.drawColor(Color.parseColor("#4CAF50")); // Green World
                  Paint p = new Paint();
                  
                  // Draw Rustling Grass Effect
                  p.setColor(Color.parseColor("#388E3C"));
                  for(int x=0; x<2000; x+=200) for(int y=0; y<2000; y+=200) c.drawCircle(x, y, 15, p);

                  if (followerBmp != null) c.drawBitmap(followerBmp, fx-50, fy-50, null);
                  if (playerBmp != null) c.drawBitmap(playerBmp, px-64, py-64, null);
              }

              public void resume() { running = true; thread = new Thread(this); thread.start(); }
              public void pause() { running = false; }
          }""")

          # MainActivity.java
          create_file(f"{java_pkg}/MainActivity.java", """package com.genesis.pokemon;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.MotionEvent;

          public class MainActivity extends Activity {
              private GameView gv;
              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
                  gv = findViewById(R.id.game_viewport);
                  bind(R.id.btn_up, 1); bind(R.id.btn_down, 2);
                  bind(R.id.btn_left, 3); bind(R.id.btn_right, 4);
              }
              private void bind(int id, int d) {
                  findViewById(id).setOnTouchListener((v, e) -> {
                      boolean p = e.getAction() == MotionEvent.ACTION_DOWN || e.getAction() == MotionEvent.ACTION_MOVE;
                      if (d==1) gv.mU=p; if (d==2) gv.mD=p; if (d==3) gv.mL=p; if (d==4) gv.mR=p;
                      return true;
                  });
              }
              @Override protected void onResume() { super.onResume(); gv.resume(); }
          }""")
          EOF

      - name: Execute Pipeline
        run: |
          cd MyPokemonGame
          python scripts/1-scaffold.py
          python scripts/2-ui.py
          python scripts/3-assets.py
          python scripts/4-engine.py
