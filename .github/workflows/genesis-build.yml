import os
def create_file(path, content):
    dir_name = os.path.dirname(path)
    if dir_name: os.makedirs(dir_name, exist_ok=True)
    with open(path, 'w', encoding='utf-8') as f: f.write(content)

java_path = "app/src/main/java/com/genesis/pokemon"

# 4a. SpriteManager - Handles loading PNGs from assets
create_file(f"{java_path}/SpriteManager.java", """package com.genesis.pokemon;
import android.content.Context;
import android.graphics.Bitmap;
import android.graphics.BitmapFactory;
import java.io.InputStream;
import java.util.HashMap;

public class SpriteManager {
    private static HashMap<String, Bitmap> cache = new HashMap<>();
    public static Bitmap get(Context ctx, String name) {
        if (cache.containsKey(name)) return cache.get(name);
        try {
            InputStream is = ctx.getAssets().open("sprites/" + name + ".png");
            Bitmap b = BitmapFactory.decodeStream(is);
            cache.put(name, b);
            return b;
        } catch (Exception e) { return null; }
    }
}""")

# 4b. Updated GameView with Sprite Rendering
create_file(f"{java_path}/GameView.java", """package com.genesis.pokemon;
import android.content.Context;
import android.graphics.*;
import android.util.AttributeSet;
import android.view.SurfaceView;
import java.util.LinkedList;

public class GameView extends SurfaceView implements Runnable {
    private Thread thread;
    private boolean running;
    public float px = 300, py = 300, fx = 300, fy = 380;
    public boolean mU, mD, mL, mR;
    private LinkedList<PointF> history = new LinkedList<>();

    public GameView(Context c, AttributeSet a) { super(c, a); }

    @Override public void run() {
        while (running) {
            if (!getHolder().getSurface().isValid()) continue;
            Canvas canvas = getHolder().lockCanvas();
            update();
            drawFrame(canvas);
            getHolder().unlockCanvasAndPost(canvas);
            try { Thread.sleep(16); } catch (Exception e) {}
        }
    }

    private void update() {
        float speed = 6;
        float oldX = px, oldY = py;
        if (mU) py -= speed; if (mD) py += speed;
        if (mL) px -= speed; if (mR) px += speed;

        if (px != oldX || py != oldY) {
            history.addFirst(new PointF(px, py));
            if (history.size() > 15) {
                PointF last = history.removeLast();
                fx = last.x; fy = last.y;
            }
        }
    }

    private void drawFrame(Canvas c) {
        c.drawColor(Color.parseColor("#388E3C")); // Grass
        
        Bitmap playerSprite = SpriteManager.get(getContext(), "bulbasaur");
        Bitmap followerSprite = SpriteManager.get(getContext(), "pikachu");
        
        if (playerSprite != null) 
            c.drawBitmap(playerSprite, px - 64, py - 64, null);
        if (followerSprite != null)
            c.drawBitmap(followerSprite, fx - 48, fy - 48, null);
    }
    
    public void resume() { running = true; thread = new Thread(this); thread.start(); }
    public void pause() { running = false; }
}""")

# 4c. MainActivity (The Fix)
create_file(f"{java_path}/MainActivity.java", """package com.genesis.pokemon;
import android.app.Activity;
import android.content.Intent;
import android.os.Bundle;
import android.view.MotionEvent;

public class MainActivity extends Activity {
    private GameView gv;
    @Override protected void onCreate(Bundle b) {
        super.onCreate(b);
        setContentView(R.layout.activity_main);
        gv = findViewById(R.id.game_viewport);
        
        bind(R.id.btn_up, 1); bind(R.id.btn_down, 2);
        bind(R.id.btn_left, 3); bind(R.id.btn_right, 4);
        
        findViewById(R.id.btn_start).setOnClickListener(v -> {
            startActivity(new Intent(this, PokedexActivity.class));
        });
    }
    private void bind(int id, int d) {
        findViewById(id).setOnTouchListener((v, e) -> {
            boolean p = (e.getAction() == MotionEvent.ACTION_DOWN || e.getAction() == MotionEvent.ACTION_MOVE);
            if (d==1) gv.mU=p; if (d==2) gv.mD=p; if (d==3) gv.mL=p; if (d==4) gv.mR=p;
            return true;
        });
    }
    @Override protected void onResume() { super.onResume(); gv.resume(); }
    @Override protected void onPause() { super.onPause(); gv.pause(); }
}""")
