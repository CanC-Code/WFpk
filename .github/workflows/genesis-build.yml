name: Genesis 8.0 - Authentic Emerald Engine

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: pip install Pillow requests

      - name: Initialize Workspace
        run: mkdir -p MyPokemonGame/scripts

      - name: Generate Genesis Scripts
        run: |
          cd MyPokemonGame
          
          # --- SCRIPT 1: STABLE SCAFFOLD ---
          cat << 'EOF' > scripts/1-scaffold.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          create_file("build.gradle", "plugins { id 'com.android.application' version '8.4.0' apply false }")
          create_file("settings.gradle", "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }; dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }; include ':app'")
          create_file("gradle.properties", "android.useAndroidX=true\nandroid.enableJetifier=true")
          create_file("app/build.gradle", "plugins { id 'com.android.application' }; android { namespace 'com.genesis.pokemon'; compileSdk 34; defaultConfig { applicationId 'com.genesis.pokemon'; minSdk 24; targetSdk 34; versionCode 1; versionName '2.0' }; buildTypes { release { minifyEnabled false } }; compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 } }; dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.9.0' }")
          create_file("app/src/main/AndroidManifest.xml", '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="Emerald Engine" android:theme="@style/Theme.Material3.DayNight.NoActionBar"><activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>')
          EOF

          # --- SCRIPT 2: AUTHENTIC EMULATOR UI ---
          cat << 'EOF' > scripts/2-ui.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          layout = """<?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#121212">
              
              <com.genesis.pokemon.GameView android:id="@+id/game_viewport" android:layout_width="match_parent" android:layout_height="match_parent" />
              
              <View android:id="@+id/joystick_base" android:layout_width="200dp" android:layout_height="200dp" android:layout_gravity="bottom|start" android:layout_margin="20dp" android:background="@android:drawable/btn_default_small" android:alpha="0.3"/>

              <RelativeLayout android:layout_width="160dp" android:layout_height="100dp" android:layout_gravity="bottom|end" android:layout_margin="30dp">
                  <Button android:id="@+id/btn_b" android:layout_width="70dp" android:layout_height="70dp" android:text="B" android:backgroundTint="#F44336" android:layout_alignParentBottom="true"/>
                  <Button android:id="@+id/btn_a" android:layout_width="70dp" android:layout_height="70dp" android:text="A" android:backgroundTint="#2196F3" android:layout_alignParentEnd="true" android:layout_alignParentTop="true"/>
              </RelativeLayout>

              <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_gravity="bottom|center_horizontal" android:layout_marginBottom="20dp" android:orientation="horizontal">
                  <Button android:id="@+id/btn_select" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="SELECT" android:backgroundTint="#424242" android:layout_marginEnd="10dp"/>
                  <Button android:id="@+id/btn_start" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="START" android:backgroundTint="#424242"/>
              </LinearLayout>

              <LinearLayout android:id="@+id/start_menu" android:layout_width="220dp" android:layout_height="wrap_content" android:layout_gravity="end|top" android:layout_margin="20dp" android:orientation="vertical" android:background="#FAFAFA" android:padding="12dp" android:elevation="10dp" android:visibility="gone">
                  <TextView android:layout_width="match_parent" android:layout_height="wrap_content" android:text="MENU" android:textStyle="bold" android:textSize="18sp" android:layout_marginBottom="10dp" android:textColor="#000000"/>
                  <Button android:id="@+id/menu_pokedex" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="POKEDEX" android:backgroundTint="#E0E0E0" android:textColor="#000"/>
                  <Button android:id="@+id/menu_pokemon" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="POKÉMON" android:backgroundTint="#E0E0E0" android:textColor="#000"/>
                  <Button android:id="@+id/menu_bag" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="BAG" android:backgroundTint="#E0E0E0" android:textColor="#000"/>
                  <Button android:id="@+id/menu_save" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="SAVE" android:backgroundTint="#E0E0E0" android:textColor="#000"/>
              </LinearLayout>
              
              <ListView android:id="@+id/pokedex_list" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#FFFFFF" android:visibility="gone" />
          </FrameLayout>"""
          create_file("app/src/main/res/layout/activity_main.xml", layout)
          EOF

          # --- SCRIPT 3: FETCH AUTHENTIC DECOMPILED ASSETS ---
          cat << 'EOF' > scripts/3-assets.py
          import os, requests, json
          from PIL import Image, ImageDraw
          from concurrent.futures import ThreadPoolExecutor

          os.makedirs("app/src/main/assets/sprites", exist_ok=True)
          os.makedirs("app/src/main/assets/tiles", exist_ok=True)

          # 1. Fetch Real Emerald Brendan Sprite Sheet (48x64 - 3 frames wide, 4 directions high)
          base_pret = "https://raw.githubusercontent.com/pret/pokeemerald/master/graphics/object_events/pics/"
          with open("app/src/main/assets/sprites/trainer.png", 'wb') as f: 
              f.write(requests.get(base_pret + "people/brendan/normal.png").content)
              
          # 2. Fetch Zigzagoon Follower Sprite Sheet
          with open("app/src/main/assets/sprites/follower.png", 'wb') as f: 
              f.write(requests.get(base_pret + "pokemon/zigzagoon.png").content)

          # 3. Fetch Emerald Trees and Objects
          with open("app/src/main/assets/tiles/tree.png", 'wb') as f: 
              f.write(requests.get(base_pret + "misc/cuttable_tree.png").content)

          # 4. Generate Stylized High-Res Grass & Path (To avoid index cropping issues)
          grass = Image.new("RGBA", (64, 64), "#8BC34A")
          d = ImageDraw.Draw(grass)
          for x, y in [(10, 15), (45, 25), (25, 45), (50, 50)]:
              d.polygon([(x, y), (x+6, y-12), (x+12, y)], fill="#689F38")
          grass.save("app/src/main/assets/tiles/grass.png")
          
          path = Image.new("RGBA", (64, 64), "#D7CCC8")
          d2 = ImageDraw.Draw(path)
          d2.rectangle([0,0,64,64], outline="#A1887F", width=2)
          path.save("app/src/main/assets/tiles/path.png")

          # 5. Build Pokedex Data (API limits applied for quick GitHub build)
          pokedex = []
          for i in range(1, 15):
              try:
                  res = requests.get(f"https://pokeapi.co/api/v2/pokemon/{i}").json()
                  pokedex.append({"id": i, "name": res['name'].capitalize(), "hp": res['stats'][0]['base_stat']})
              except: pass
          with open("app/src/main/assets/pokedex.json", 'w') as f: json.dump(pokedex, f)
          EOF

          # --- SCRIPT 4: ANIMATION ENGINE & COLLISION ---
          cat << 'EOF' > scripts/4-engine.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          java_path = "app/src/main/java/com/genesis/pokemon"

          create_file(f"{java_path}/AssetManager.java", """package com.genesis.pokemon;
          import android.content.Context;
          import android.graphics.Bitmap;
          import android.graphics.BitmapFactory;
          import java.util.HashMap;
          public class AssetManager {
              private static HashMap<String, Bitmap> cache = new HashMap<>();
              public static Bitmap get(Context ctx, String type, String name) {
                  String key = type + "_" + name;
                  if (cache.containsKey(key)) return cache.get(key);
                  try {
                      Bitmap b = BitmapFactory.decodeStream(ctx.getAssets().open(type + "/" + name + ".png"));
                      cache.put(key, b); return b;
                  } catch (Exception e) { return null; }
              }
          }""")

          create_file(f"{java_path}/GameView.java", """package com.genesis.pokemon;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.SurfaceView;
          import java.util.LinkedList;

          public class GameView extends SurfaceView implements Runnable {
              private Thread thread;
              public boolean r;
              
              // Physics
              public float px=128, py=128; 
              public float vx=0, vy=0;
              public int direction = 0; // 0=Down, 1=Up, 2=Left, 3=Right
              
              // Animation Sequencer
              private int frameCounter = 0;
              private int animStep = 0; // 0, 1, 2 (Left foot, Stand, Right foot)
              private LinkedList<PointF> history = new LinkedList<>();

              // Map (0=Grass, 1=Path, 2=Tree/Solid)
              private int[][] map = {
                  {2,2,2,2,2,2,2,2,2,2},
                  {2,1,1,1,0,0,0,0,0,2},
                  {2,1,2,1,0,2,0,0,0,2},
                  {2,1,1,1,0,0,0,0,0,2},
                  {2,2,2,2,2,2,2,2,2,2}
              };

              public GameView(Context c, AttributeSet a) { super(c, a); }

              @Override public void run() {
                  while (r) {
                      if (!getHolder().getSurface().isValid()) continue;
                      Canvas c = getHolder().lockCanvas();
                      update();
                      drawGame(c);
                      getHolder().unlockCanvasAndPost(c);
                      try { Thread.sleep(16); } catch (Exception e) {}
                  }
              }

              private void update() {
                  float s = 6; 
                  float tx = px, ty = py;
                  
                  // Strict 4-Way Parsing from Analog Joystick
                  if (Math.abs(vx) > Math.abs(vy)) {
                      if (vx > 0) { tx += s; direction = 3; } else if (vx < 0) { tx -= s; direction = 2; }
                  } else {
                      if (vy > 0) { ty += s; direction = 0; } else if (vy < 0) { ty -= s; direction = 1; }
                  }

                  // Animation Timer
                  if (vx != 0 || vy != 0) {
                      frameCounter++;
                      if (frameCounter > 10) { animStep = (animStep + 1) % 3; frameCounter = 0; }
                  } else { animStep = 1; } // Stand still frame

                  // Collision bounds (Tile size = 64)
                  int gX = (int)((tx+32) / 64), gY = (int)((ty+32) / 64);
                  if (gY >= 0 && gY < map.length && gX >= 0 && gX < map[0].length) {
                      if (map[gY][gX] != 2) { px = tx; py = ty; } // 2 is Tree (Solid)
                  }

                  if (vx != 0 || vy != 0) {
                      history.addFirst(new PointF(px, py));
                      if (history.size() > 20) history.removeLast();
                  }
              }

              private void drawGame(Canvas c) {
                  c.drawColor(Color.BLACK);
                  Bitmap grass = AssetManager.get(getContext(), "tiles", "grass");
                  Bitmap path = AssetManager.get(getContext(), "tiles", "path");
                  Bitmap tree = AssetManager.get(getContext(), "tiles", "tree");
                  
                  // Draw Environment
                  for (int y=0; y<map.length; y++) {
                      for (int x=0; x<map[0].length; x++) {
                          Rect dst = new Rect(x*64, y*64, (x+1)*64, (y+1)*64);
                          if (map[y][x] == 0 && grass != null) c.drawBitmap(grass, null, dst, null);
                          else if (map[y][x] == 1 && path != null) c.drawBitmap(path, null, dst, null);
                          else if (map[y][x] == 2 && tree != null) {
                              if (grass != null) c.drawBitmap(grass, null, dst, null); // Grass under tree
                              c.drawBitmap(tree, null, dst, null);
                          }
                      }
                  }

                  // Slice & Draw Trainer (Decomp sprites are 3 frames wide (16px), 4 dirs high (16px))
                  Bitmap trainer = AssetManager.get(getContext(), "sprites", "trainer");
                  if (trainer != null) {
                      int srcX = animStep * 16;
                      int srcY = direction * 16;
                      Rect src = new Rect(srcX, srcY, srcX + 16, srcY + 16);
                      Rect dst = new Rect((int)px - 16, (int)py - 32, (int)px + 48, (int)py + 32); // Scaled up 4x
                      c.drawBitmap(trainer, src, dst, null);
                  }
                  
                  // Slice & Draw Follower
                  Bitmap follower = AssetManager.get(getContext(), "sprites", "follower");
                  if (follower != null && history.size() > 15) {
                      PointF fPos = history.get(15);
                      Rect src = new Rect(animStep * 16, direction * 16, (animStep * 16) + 16, (direction * 16) + 16);
                      Rect dst = new Rect((int)fPos.x - 16, (int)fPos.y - 32, (int)fPos.x + 48, (int)fPos.y + 32);
                      c.drawBitmap(follower, src, dst, null);
                  }
              }
              public void resume() { r = true; thread = new Thread(this); thread.start(); }
              public void pause() { r = false; }
          }""")
          EOF

          # --- SCRIPT 5: MAIN ACTIVITY & QOL FEATURES ---
          cat << 'EOF' > scripts/5-main.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          java_path = "app/src/main/java/com/genesis/pokemon"

          create_file(f"{java_path}/MainActivity.java", """package com.genesis.pokemon;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.MotionEvent;
          import android.view.View;
          import android.widget.ArrayAdapter;
          import android.widget.ListView;
          import org.json.JSONArray;
          import java.io.InputStream;
          import java.util.ArrayList;

          public class MainActivity extends Activity {
              private GameView gv;
              private View startMenu;
              private ListView pokedexList;

              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
                  gv = findViewById(R.id.game_viewport);
                  startMenu = findViewById(R.id.start_menu);
                  pokedexList = findViewById(R.id.pokedex_list);

                  // Draggable Analog to 4-Way Joystick Logic
                  findViewById(R.id.joystick_base).setOnTouchListener((v, e) -> {
                      if (e.getAction() == MotionEvent.ACTION_UP) { 
                          gv.vx = 0; gv.vy = 0; 
                      } else {
                          float dx = e.getX() - (v.getWidth()/2f), dy = e.getY() - (v.getHeight()/2f);
                          // Snap to dominant axis to prevent diagonal movement
                          if (Math.abs(dx) > Math.abs(dy)) { gv.vx = Math.signum(dx); gv.vy = 0; }
                          else { gv.vx = 0; gv.vy = Math.signum(dy); }
                      }
                      return true;
                  });

                  // START Menu Toggle
                  findViewById(R.id.btn_start).setOnClickListener(v -> {
                      if (startMenu.getVisibility() == View.VISIBLE) {
                          startMenu.setVisibility(View.GONE); gv.resume();
                      } else {
                          startMenu.setVisibility(View.VISIBLE); gv.pause();
                      }
                  });

                  // Pokedex Integration
                  findViewById(R.id.menu_pokedex).setOnClickListener(v -> {
                      startMenu.setVisibility(View.GONE);
                      pokedexList.setVisibility(View.VISIBLE);
                      ArrayList<String> entries = new ArrayList<>();
                      try {
                          InputStream is = getAssets().open("pokedex.json");
                          byte[] buf = new byte[is.available()]; is.read(buf);
                          JSONArray arr = new JSONArray(new String(buf));
                          for(int i=0; i<arr.length(); i++) {
                              entries.add("#" + arr.getJSONObject(i).getInt("id") + " " + arr.getJSONObject(i).getString("name") + " - HP: " + arr.getJSONObject(i).getInt("hp"));
                          }
                      } catch (Exception ex) { entries.add("Error loading Pokedex data."); }
                      pokedexList.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_list_item_1, entries));
                  });

                  pokedexList.setOnItemClickListener((parent, view, position, id) -> {
                      pokedexList.setVisibility(View.GONE); gv.resume();
                  });
              }
              @Override protected void onResume() { super.onResume(); gv.resume(); }
              @Override protected void onPause() { super.onPause(); gv.pause(); }
          }""")
          EOF

      - name: Execute Genesis Pipeline
        run: |
          cd MyPokemonGame
          python scripts/1-scaffold.py
          python scripts/2-ui.py
          python scripts/3-assets.py
          python scripts/4-engine.py
          python scripts/5-main.py

      - name: Build APK (Pinned Gradle 8.7)
        run: |
          cd MyPokemonGame
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Genesis-8.0-APK
          path: MyPokemonGame/app/build/outputs/apk/debug/app-debug.apk
