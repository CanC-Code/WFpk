name: Genesis 22.0 - Platinum Standard

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: pip install Pillow requests

      - name: Initialize Workspace
        run: mkdir -p MyPokemonGame/scripts

      - name: Generate Genesis Factory
        run: |
          cd MyPokemonGame
          
          # --- 1. SCAFFOLD (Project Infrastructure) ---
          cat << 'EOF' > scripts/1-scaffold.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)
          create_file("build.gradle", "plugins { id 'com.android.application' version '8.4.0' apply false }")
          create_file("settings.gradle", "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }; dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }; include ':app'")
          create_file("gradle.properties", "android.useAndroidX=true\nandroid.enableJetifier=true")
          create_file("app/build.gradle", "plugins { id 'com.android.application' }; android { namespace 'com.genesis.pokemon'; compileSdk 34; defaultConfig { applicationId 'com.genesis.pokemon'; minSdk 24; targetSdk 34; versionCode 1; versionName '22.0' }; buildTypes { release { minifyEnabled false } }; compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 } }; dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.9.0' }")
          create_file("app/src/main/AndroidManifest.xml", '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="Pokemon Platinum" android:theme="@style/Theme.Material3.DayNight.NoActionBar"><activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>')
          EOF

          # --- 2. UI (Precision D-Pad & QOL Menus) ---
          cat << 'EOF' > scripts/2-ui.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)
          layout = """<?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#121212">
              <com.genesis.pokemon.GameView android:id="@+id/game_viewport" android:layout_width="match_parent" android:layout_height="match_parent" />
              <GridLayout android:layout_width="200dp" android:layout_height="200dp" android:layout_gravity="bottom|start" android:columnCount="3" android:rowCount="3" android:layout_margin="20dp" android:alpha="0.8">
                  <View android:layout_width="66dp" android:layout_height="66dp"/> <Button android:id="@+id/btn_up" android:layout_width="66dp" android:layout_height="66dp" android:text="▲" android:backgroundTint="#2C2C2C"/> <View android:layout_width="66dp" android:layout_height="66dp"/>
                  <Button android:id="@+id/btn_left" android:layout_width="66dp" android:layout_height="66dp" android:text="◀" android:backgroundTint="#2C2C2C"/> <View android:layout_width="66dp" android:layout_height="66dp"/> <Button android:id="@+id/btn_right" android:layout_width="66dp" android:layout_height="66dp" android:text="▶" android:backgroundTint="#2C2C2C"/>
                  <View android:layout_width="66dp" android:layout_height="66dp"/> <Button android:id="@+id/btn_down" android:layout_width="66dp" android:layout_height="66dp" android:text="▼" android:backgroundTint="#2C2C2C"/> <View android:layout_width="66dp" android:layout_height="66dp"/>
              </GridLayout>
              <RelativeLayout android:layout_width="match_parent" android:layout_height="match_parent">
                  <Button android:id="@+id/btn_start" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="MENU" android:layout_centerHorizontal="true" android:layout_alignParentBottom="true" android:layout_marginBottom="30dp" android:backgroundTint="#455A64"/>
                  <Button android:id="@+id/btn_b" android:layout_width="75dp" android:layout_height="75dp" android:text="B" android:layout_alignParentBottom="true" android:layout_alignParentEnd="true" android:layout_margin="35dp" android:backgroundTint="#D32F2F"/>
                  <Button android:id="@+id/btn_a" android:layout_width="75dp" android:layout_height="75dp" android:text="A" android:layout_above="@id/btn_b" android:layout_alignParentEnd="true" android:layout_marginEnd="35dp" android:layout_marginBottom="-10dp" android:backgroundTint="#1976D2"/>
              </RelativeLayout>
              <LinearLayout android:id="@+id/rpg_menu" android:layout_width="240dp" android:layout_height="wrap_content" android:layout_gravity="end|top" android:layout_margin="20dp" android:orientation="vertical" android:background="#F5F5F5" android:padding="15dp" android:elevation="8dp" android:visibility="gone">
                  <Button android:id="@+id/menu_pokedex" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="POKÉDEX" android:textColor="#000" android:backgroundTint="#E0E0E0" android:layout_marginBottom="5dp"/>
                  <Button android:id="@+id/menu_bag" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="BAG" android:textColor="#000" android:backgroundTint="#E0E0E0" android:layout_marginBottom="5dp"/>
                  <Button android:id="@+id/menu_save" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="SAVE" android:textColor="#000" android:backgroundTint="#E0E0E0"/>
              </LinearLayout>
              <ListView android:id="@+id/list_view" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#FFFFFF" android:visibility="gone" />
          </FrameLayout>"""
          create_file("app/src/main/res/layout/activity_main.xml", layout)
          EOF

          # --- 3. ASSETS (Authentic Platinum Ripper) ---
          cat << 'EOF' > scripts/3-assets.py
          import os, requests, json
          from PIL import Image, ImageDraw
          from io import BytesIO
          os.makedirs("app/src/main/assets/sprites", exist_ok=True)
          os.makedirs("app/src/main/assets/tiles", exist_ok=True)
          
          # Fetch Real Decomp Sprite Sheet (Brendan/Lucas)
          def fetch_sheet(url, path):
              try:
                  res = requests.get(url, timeout=10)
                  img = Image.open(BytesIO(res.content)).convert("RGBA")
                  img.save(path)
              except:
                  # Create high-quality fallback if internet is down
                  fallback = Image.new("RGBA", (48, 128), (0,0,0,0))
                  d = ImageDraw.Draw(fallback)
                  for i in range(4): d.rectangle([16, i*32+8, 32, i*32+32], fill="#FFF")
                  fallback.save(path)

          fetch_sheet("https://raw.githubusercontent.com/pret/pokeemerald/master/graphics/object_events/pics/people/brendan/normal.png", "app/src/main/assets/sprites/trainer.png")
          
          # Generate Sinnoh Environment Tileset
          tiles = Image.new("RGBA", (256, 64))
          d = ImageDraw.Draw(tiles)
          d.rectangle([0,0,64,64], fill="#4CAF50")    # 0: Grass
          d.rectangle([64,0,128,64], fill="#9E9E9E")  # 1: Path
          d.rectangle([128,0,192,64], fill="#C62828") # 2: Building
          d.rectangle([192,0,256,64], fill="#1B5E20") # 3: Solid Tree
          tiles.save("app/src/main/assets/tiles/world_tiles.png")

          # Pokedex Registry
          data = [{"id": 1, "name": "Bulbasaur"}, {"id": 25, "name": "Pikachu"}, {"id": 150, "name": "Mewtwo"}]
          with open("app/src/main/assets/pokedex.json", 'w') as f: json.dump(data, f)
          EOF

          # --- 4. ENGINE (The Core Logic: Stepping, Camera, & Slicing) ---
          cat << 'EOF' > scripts/4-engine.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)
          java_path = "app/src/main/java/com/genesis/pokemon"

          create_file(f"{java_path}/GameView.java", """package com.genesis.pokemon;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.SurfaceView;
          import java.io.InputStream;

          public class GameView extends SurfaceView implements Runnable {
              private Thread thread;
              private boolean running;
              private Bitmap bmpTiles, bmpTrainer;
              
              // Physics (Tile = 64px scaled)
              public float px=640, py=640, tx=640, ty=640; 
              public int gx=10, gy=10, dir=0, anim=0, counter=0;
              public boolean moving=false, u, d, l, r;
              private int[] cycle = {1, 0, 1, 2}; // Stand, Left, Stand, Right

              // 50x50 Map Matrix
              private int[][] map = new int[50][50];

              public GameView(Context c, AttributeSet a) { 
                  super(c, a);
                  for(int i=0; i<50; i++) for(int j=0; j<50; j++) map[i][j] = (i==0||i==49||j==0||j==49)?3:0;
              }

              @Override public void run() {
                  try {
                      bmpTiles = BitmapFactory.decodeStream(getContext().getAssets().open("tiles/world_tiles.png"));
                      bmpTrainer = BitmapFactory.decodeStream(getContext().getAssets().open("sprites/trainer.png"));
                  } catch (Exception e) {}
                  while (running) {
                      if (!getHolder().getSurface().isValid()) continue;
                      Canvas c = getHolder().lockCanvas();
                      update();
                      draw(c);
                      getHolder().unlockCanvasAndPost(c);
                      try { Thread.sleep(16); } catch (Exception e) {}
                  }
              }

              private void update() {
                  float s = 4.0f;
                  if (px < tx) px = Math.min(px+s, tx); else if (px > tx) px = Math.max(px-s, tx);
                  if (py < ty) py = Math.min(py+s, ty); else if (py > ty) py = Math.max(py-s, ty);

                  if (px == tx && py == ty) {
                      moving = false;
                      int nx=gx, ny=gy;
                      if (u) { ny--; dir=1; moving=true; } else if (d) { ny++; dir=0; moving=true; }
                      else if (l) { nx--; dir=2; moving=true; } else if (r) { nx++; dir=3; moving=true; }
                      
                      if (moving && ny>=0 && ny<50 && nx>=0 && nx<50 && map[ny][nx] < 2) {
                          gx=nx; gy=ny; tx=gx*64; ty=gy*64;
                      } else moving=false;
                  }
                  if (moving) { counter++; if (counter>8) { anim=(anim+1)%4; counter=0; } } else anim=0;
              }

              private void draw(Canvas c) {
                  c.drawColor(Color.BLACK);
                  if (bmpTiles == null || bmpTrainer == null) return;
                  int sw=getWidth(), sh=getHeight();
                  int cx=(int)px-(sw/2)+32, cy=(int)py-(sh/2)+32;
                  
                  for(int y=0; y<50; y++) for(int x=0; x<50; x++) {
                      int dx=x*64-cx, dy=y*64-cy;
                      if (dx>-64 && dx<sw && dy>-64 && dy<sh) {
                          int t=map[y][x];
                          c.drawBitmap(bmpTiles, new Rect(t*64,0,(t*64)+64,64), new Rect(dx,dy,dx+64,dy+64), null);
                      }
                  }
                  int f=cycle[anim];
                  c.drawBitmap(bmpTrainer, new Rect(f*16,dir*32,(f+1)*16,(dir+1)*32), new Rect(sw/2-32,sh/2-64,sw/2+32,sh/2+64), null);
              }
              public void resume() { running=true; thread=new Thread(this); thread.start(); }
              public void pause() { running=false; }
          }""")
          EOF

          # --- 5. MAIN (Logic Wiring & Menu) ---
          cat << 'EOF' > scripts/5-main.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)
          java_path = "app/src/main/java/com/genesis/pokemon"

          create_file(f"{java_path}/MainActivity.java", """package com.genesis.pokemon;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.MotionEvent;
          import android.view.View;
          import android.widget.ArrayAdapter;
          import android.widget.ListView;
          import android.widget.Toast;
          import org.json.JSONArray;
          import java.io.InputStream;
          import java.util.ArrayList;

          public class MainActivity extends Activity {
              private GameView gv;
              private View menu;
              private ListView list;

              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
                  gv = findViewById(R.id.game_viewport);
                  menu = findViewById(R.id.rpg_menu);
                  list = findViewById(R.id.list_view);

                  bind(R.id.btn_up, 1); bind(R.id.btn_down, 2);
                  bind(R.id.btn_left, 3); bind(R.id.btn_right, 4);

                  findViewById(R.id.btn_start).setOnClickListener(v -> {
                      if (menu.getVisibility() == View.VISIBLE) { menu.setVisibility(View.GONE); gv.resume(); }
                      else { menu.setVisibility(View.VISIBLE); gv.pause(); }
                  });

                  findViewById(R.id.menu_pokedex).setOnClickListener(v -> load("pokedex.json"));
                  findViewById(R.id.menu_save).setOnClickListener(v -> {
                      Toast.makeText(this, "Game Saved!", Toast.LENGTH_SHORT).show();
                      menu.setVisibility(View.GONE); gv.resume();
                  });

                  list.setOnItemClickListener((p, v, pos, id) -> { list.setVisibility(View.GONE); gv.resume(); });
              }

              private void load(String file) {
                  menu.setVisibility(View.GONE); list.setVisibility(View.VISIBLE);
                  ArrayList<String> entries = new ArrayList<>();
                  try {
                      InputStream is = getAssets().open(file);
                      byte[] buf = new byte[is.available()]; is.read(buf);
                      JSONArray arr = new JSONArray(new String(buf));
                      for(int i=0; i<arr.length(); i++) entries.add(arr.getJSONObject(i).getString("name"));
                  } catch (Exception e) {}
                  list.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_list_item_1, entries));
              }

              private void bind(int id, int d) {
                  findViewById(id).setOnTouchListener((v, e) -> {
                      boolean p = e.getAction()==MotionEvent.ACTION_DOWN || e.getAction()==MotionEvent.ACTION_MOVE;
                      if(d==1) gv.u=p; if(d==2) gv.d=p; if(d==3) gv.l=p; if(d==4) gv.r=p;
                      return true;
                  });
              }
              @Override protected void onResume() { super.onResume(); gv.resume(); }
          }""")
          EOF

      - name: Build Project
        run: |
          cd MyPokemonGame
          python scripts/1-scaffold.py
          python scripts/2-ui.py
          python scripts/3-assets.py
          python scripts/4-engine.py
          python scripts/5-main.py
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Platinum-Zenith-v22
          path: MyPokemonGame/app/build/outputs/apk/debug/app-debug.apk
