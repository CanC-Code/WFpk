name: Genesis 5.0 - Emerald Soul Engine

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: pip install Pillow requests

      - name: Initialize Workspace
        run: mkdir -p MyPokemonGame/scripts

      - name: Generate Genesis Scripts
        run: |
          cd MyPokemonGame
          
          # --- SCRIPT 1: STABLE SCAFFOLD ---
          cat << 'EOF' > scripts/1-scaffold.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          create_file("build.gradle", "plugins { id 'com.android.application' version '8.4.0' apply false }")
          create_file("settings.gradle", "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }; dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }; include ':app'")
          create_file("gradle.properties", "android.useAndroidX=true\nandroid.enableJetifier=true")
          create_file("app/build.gradle", "plugins { id 'com.android.application' }; android { namespace 'com.genesis.pokemon'; compileSdk 34; defaultConfig { applicationId 'com.genesis.pokemon'; minSdk 24; targetSdk 34; versionCode 1; versionName '1.5' }; buildTypes { release { minifyEnabled false } }; compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 } }; dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.9.0' }")
          create_file("app/src/main/AndroidManifest.xml", '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="Genesis 5.0" android:theme="@style/Theme.Material3.DayNight.NoActionBar"><activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>')
          EOF

          # --- SCRIPT 2: MODERN JOYSTICK UI ---
          cat << 'EOF' > scripts/2-ui.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          layout = """<?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent">
              <com.genesis.pokemon.GameView android:id="@+id/game_viewport" android:layout_width="match_parent" android:layout_height="match_parent" />
              
              <View android:id="@+id/joystick_base" android:layout_width="150dp" android:layout_height="150dp" 
                  android:layout_alignParentBottom="true" android:layout_margin="30dp"
                  android:background="@android:drawable/btn_default_small" android:alpha="0.4"/>

              <RelativeLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_alignParentBottom="true" android:layout_alignParentEnd="true" android:layout_margin="40dp">
                  <Button android:id="@+id/btn_b" android:layout_width="80dp" android:layout_height="80dp" android:text="B" android:backgroundTint="#F44336" android:layout_marginEnd="90dp"/>
                  <Button android:id="@+id/btn_a" android:layout_width="80dp" android:layout_height="80dp" android:text="A" android:backgroundTint="#2196F3" android:layout_toEndOf="@id/btn_b" android:layout_marginTop="-30dp"/>
              </RelativeLayout>
          </RelativeLayout>"""
          create_file("app/src/main/res/layout/activity_main.xml", layout)
          EOF

          # --- SCRIPT 3: ADVANCED ASSET PIPELINE (Human + Pokes) ---
          cat << 'EOF' > scripts/3-assets.py
          import os, requests
          os.makedirs("app/src/main/assets/sprites", exist_ok=True)
          
          # 1. Fetch Human Trainer (Brendan from Gen 3 Decomp)
          trainer_url = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/trainers/1.png"
          with open("app/src/main/assets/sprites/trainer.png", 'wb') as f: f.write(requests.get(trainer_url).content)
          
          # 2. Fetch Pokémon
          for p in ["bulbasaur", "pikachu"]:
              r = requests.get(f"https://pokeapi.co/api/v2/pokemon/{p}").json()
              img = requests.get(r['sprites']['front_default']).content
              with open(f"app/src/main/assets/sprites/{p}.png", 'wb') as f: f.write(img)
          EOF

          # --- SCRIPT 4: THE JOYSTICK & ANIMATION ENGINE ---
          cat << 'EOF' > scripts/4-engine.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          java_path = "app/src/main/java/com/genesis/pokemon"

          create_file(f"{java_path}/GameView.java", """package com.genesis.pokemon;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.SurfaceView;
          import java.util.LinkedList;

          public class GameView extends SurfaceView implements Runnable {
              private Thread thread;
              private boolean r;
              public float px=400, py=400, fx=400, fy=400;
              public float vx=0, vy=0; // Velocity from Joystick
              private LinkedList<PointF> history = new LinkedList<>();
              private int animFrame = 0;

              public GameView(Context c, AttributeSet a) { super(c, a); }

              @Override public void run() {
                  while (r) {
                      if (!getHolder().getSurface().isValid()) continue;
                      Canvas c = getHolder().lockCanvas();
                      update();
                      drawGame(c);
                      getHolder().unlockCanvasAndPost(c);
                      try { Thread.sleep(16); } catch (Exception e) {}
                  }
              }

              private void update() {
                  float s = 8;
                  px += vx * s; py += vy * s;
                  
                  if (vx != 0 || vy != 0) {
                      animFrame = (animFrame + 1) % 20; // Walking oscillation
                      history.addFirst(new PointF(px, py));
                      if (history.size() > 15) { PointF l = history.removeLast(); fx = l.x; fy = l.y; }
                  }
              }

              private void drawGame(Canvas c) {
                  c.drawColor(Color.parseColor("#388E3C"));
                  Bitmap trainer = SpriteManager.get(getContext(), "trainer");
                  Bitmap follower = SpriteManager.get(getContext(), "pikachu");
                  
                  // Animation: "Bobbing" effect to simulate walking
                  float bob = (vx != 0 || vy != 0) ? (float)Math.sin(animFrame * 0.5) * 5 : 0;
                  
                  if (follower != null) c.drawBitmap(follower, fx-48, fy-48 + bob, null);
                  if (trainer != null) c.drawBitmap(trainer, px-64, py-64 + bob, null);
              }
              public void resume() { r = true; thread = new Thread(this); thread.start(); }
              public void pause() { r = false; }
          }""")

          create_file(f"{java_path}/MainActivity.java", """package com.genesis.pokemon;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.MotionEvent;
          import android.view.View;

          public class MainActivity extends Activity {
              private GameView gv;
              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
                  gv = findViewById(R.id.game_viewport);
                  
                  View joystick = findViewById(R.id.joystick_base);
                  joystick.setOnTouchListener((v, e) -> {
                      if (e.getAction() == MotionEvent.ACTION_UP) {
                          gv.vx = 0; gv.vy = 0;
                      } else {
                          float centerX = v.getWidth() / 2f;
                          float centerY = v.getHeight() / 2f;
                          float dx = e.getX() - centerX;
                          float dy = e.getY() - centerY;
                          float mag = (float)Math.sqrt(dx*dx + dy*dy);
                          if (mag > 0) { gv.vx = dx / mag; gv.vy = dy / mag; }
                      }
                      return true;
                  });
              }
              @Override protected void onResume() { super.onResume(); gv.resume(); }
          }""")
          
          # SpriteManager remains the same
          create_file(f"{java_path}/SpriteManager.java", "package com.genesis.pokemon; import android.content.Context; import android.graphics.Bitmap; import android.graphics.BitmapFactory; import java.util.HashMap; public class SpriteManager { private static HashMap<String, Bitmap> cache = new HashMap<>(); public static Bitmap get(Context ctx, String name) { if (cache.containsKey(name)) return cache.get(name); try { Bitmap b = BitmapFactory.decodeStream(ctx.getAssets().open(\"sprites/\" + name + \".png\")); cache.put(name, b); return b; } catch (Exception e) { return null; } } }")
          EOF

      - name: Execute Genesis Pipeline
        run: |
          cd MyPokemonGame
          python scripts/1-scaffold.py
          python scripts/2-ui.py
          python scripts/3-assets.py
          python scripts/4-engine.py

      - name: Build APK (Pinned Gradle 8.7)
        run: |
          cd MyPokemonGame
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Genesis-5.0-APK
          path: MyPokemonGame/app/build/outputs/apk/debug/app-debug.apk
