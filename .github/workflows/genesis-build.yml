name: Genesis 15.0 - Perfect Engine

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: pip install Pillow requests

      - name: Initialize Workspace
        run: mkdir -p MyPokemonGame/scripts

      - name: Generate Genesis Scripts
        run: |
          cd MyPokemonGame
          
          # --- SCRIPT 1: STABLE SCAFFOLD ---
          cat << 'EOF' > scripts/1-scaffold.py
          import os
          def create_file(path, content):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          create_file("build.gradle", "plugins { id 'com.android.application' version '8.4.0' apply false }")
          create_file("settings.gradle", "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }; dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }; include ':app'")
          create_file("gradle.properties", "android.useAndroidX=true\nandroid.enableJetifier=true")
          create_file("app/build.gradle", "plugins { id 'com.android.application' }; android { namespace 'com.genesis.pokemon'; compileSdk 34; defaultConfig { applicationId 'com.genesis.pokemon'; minSdk 24; targetSdk 34; versionCode 1; versionName '15.0' }; buildTypes { release { minifyEnabled false } }; compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 } }; dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.9.0' }")
          create_file("app/src/main/AndroidManifest.xml", '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="Pokemon Platinum" android:theme="@style/Theme.Material3.DayNight.NoActionBar"><activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>')
          EOF

          # --- SCRIPT 2: D-PAD & UNIFIED UI ---
          cat << 'EOF' > scripts/2-ui.py
          import os
          def create_file(path, content):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          layout = """<?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000000">
              
              <com.genesis.pokemon.GameView android:id="@+id/game_viewport" android:layout_width="match_parent" android:layout_height="match_parent" />
              
              <GridLayout android:layout_width="180dp" android:layout_height="180dp" android:layout_gravity="bottom|start" android:columnCount="3" android:rowCount="3" android:layout_margin="20dp" android:alpha="0.7">
                  <View android:layout_width="60dp" android:layout_height="60dp"/> <Button android:id="@+id/btn_up" android:layout_width="60dp" android:layout_height="60dp" android:text="▲" android:backgroundTint="#424242"/> <View android:layout_width="60dp" android:layout_height="60dp"/>
                  <Button android:id="@+id/btn_left" android:layout_width="60dp" android:layout_height="60dp" android:text="◀" android:backgroundTint="#424242"/> <View android:layout_width="60dp" android:layout_height="60dp"/> <Button android:id="@+id/btn_right" android:layout_width="60dp" android:layout_height="60dp" android:text="▶" android:backgroundTint="#424242"/>
                  <View android:layout_width="60dp" android:layout_height="60dp"/> <Button android:id="@+id/btn_down" android:layout_width="60dp" android:layout_height="60dp" android:text="▼" android:backgroundTint="#424242"/> <View android:layout_width="60dp" android:layout_height="60dp"/>
              </GridLayout>

              <RelativeLayout android:layout_width="180dp" android:layout_height="120dp" android:layout_gravity="bottom|end" android:layout_margin="30dp">
                  <Button android:id="@+id/btn_b" android:layout_width="75dp" android:layout_height="75dp" android:text="B" android:backgroundTint="#D32F2F" android:layout_alignParentBottom="true"/>
                  <Button android:id="@+id/btn_a" android:layout_width="75dp" android:layout_height="75dp" android:text="A" android:backgroundTint="#1976D2" android:layout_alignParentEnd="true" android:layout_alignParentTop="true"/>
              </RelativeLayout>

              <Button android:id="@+id/btn_start" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="MENU" android:layout_gravity="bottom|center_horizontal" android:layout_marginBottom="25dp" android:backgroundTint="#455A64"/>

              <LinearLayout android:id="@+id/rpg_menu" android:layout_width="240dp" android:layout_height="wrap_content" android:layout_gravity="end|top" android:layout_margin="20dp" android:orientation="vertical" android:background="#F5F5F5" android:padding="15dp" android:elevation="8dp" android:visibility="gone">
                  <Button android:id="@+id/menu_pokedex" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="POKÉDEX" android:textColor="#000" android:backgroundTint="#E0E0E0"/>
                  <Button android:id="@+id/menu_bag" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="BAG" android:textColor="#000" android:backgroundTint="#E0E0E0"/>
                  <Button android:id="@+id/menu_save" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="SAVE" android:textColor="#000" android:backgroundTint="#E0E0E0"/>
              </LinearLayout>
              
              <ListView android:id="@+id/data_list" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#FFFFFF" android:visibility="gone" />
          </FrameLayout>"""
          create_file("app/src/main/res/layout/activity_main.xml", layout)
          EOF

          # --- SCRIPT 3: SAFE ASSET GENERATION (CRITICAL FIX) ---
          cat << 'EOF' > scripts/3-assets.py
          import os, requests, json
          from PIL import Image, ImageDraw
          from io import BytesIO

          os.makedirs("app/src/main/assets/sprites", exist_ok=True)
          os.makedirs("app/src/main/assets/tiles", exist_ok=True)

          # 1. DOWNLOAD & CONVERT TO RGBA
          # By passing it through PIL convert("RGBA"), we strip index palettes that crash Android
          url_trainer = "https://raw.githubusercontent.com/pret/pokeemerald/master/graphics/object_events/pics/people/brendan/normal.png"
          img = Image.open(BytesIO(requests.get(url_trainer).content)).convert("RGBA")
          img.save("app/src/main/assets/sprites/trainer.png")
          
          url_pika = "https://raw.githubusercontent.com/pret/pokeemerald/master/graphics/object_events/pics/pokemon/pikachu.png"
          img2 = Image.open(BytesIO(requests.get(url_pika).content)).convert("RGBA")
          img2.save("app/src/main/assets/sprites/follower.png")

          # 2. GENERATE HQ TILESET (64x64 pixel tiles)
          tiles = Image.new("RGBA", (256, 64))
          d = ImageDraw.Draw(tiles)
          d.rectangle([0,0,64,64], fill="#4CAF50")    # 0: Grass
          d.rectangle([64,0,128,64], fill="#D7CCC8")  # 1: Path
          d.rectangle([128,0,192,64], fill="#F44336") # 2: Building (Red Roof)
          d.rectangle([192,0,256,64], fill="#1B5E20") # 3: Tree
          tiles.save("app/src/main/assets/tiles/world_tiles.png")

          # 3. POKEDEX DB
          pk = [{"id": 1, "name": "Bulbasaur", "hp": 45}, {"id": 25, "name": "Pikachu", "hp": 35}]
          with open("app/src/main/assets/pokedex.json", 'w') as f: json.dump(pk, f)
          EOF

          # --- SCRIPT 4: THE CAMERA & GRID ENGINE ---
          cat << 'EOF' > scripts/4-engine.py
          import os
          def create_file(path, content):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)
          java_path = "app/src/main/java/com/genesis/pokemon"

          create_file(f"{java_path}/GameView.java", """package com.genesis.pokemon;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.SurfaceView;
          import java.io.InputStream;

          public class GameView extends SurfaceView implements Runnable {
              private Thread thread;
              private boolean running;
              
              // Pre-loaded Bitmaps (Fixes the crash)
              private Bitmap bmpTiles, bmpTrainer, bmpFollower;
              private boolean assetsLoaded = false;
              
              // Integer Grid System
              public int gridX = 5, gridY = 5;
              public int px = gridX * 64, py = gridY * 64; // Real pixel coordinates
              public int tx = px, ty = py;                 // Target coordinates
              public int speed = 8;                        // Pixels per frame
              public boolean isMoving = false;
              
              // Input & Animation
              public boolean inUp, inDown, inLeft, inRight;
              public int direction = 0; // 0=Down, 1=Up, 2=Left, 3=Right
              private int animStep = 0, frameCounter = 0;
              private int[] walkCycle = {1, 0, 1, 2}; // Stand, LeftFoot, Stand, RightFoot

              // 20x20 Map
              private int[][] map = new int[20][20];

              public GameView(Context c, AttributeSet a) { 
                  super(c, a); 
                  generateMap();
              }

              private void generateMap() {
                  for(int y=0; y<20; y++) {
                      for(int x=0; x<20; x++) {
                          if (y==0 || y==19 || x==0 || x==19) map[y][x] = 3; // Trees on border
                          else if (y==5 && x>2 && x<8) map[y][x] = 1;        // Path
                          else if (y==4 && x==5) map[y][x] = 2;              // Building
                          else map[y][x] = 0;                                // Grass
                      }
                  }
              }

              private void loadAssets() {
                  try {
                      bmpTiles = BitmapFactory.decodeStream(getContext().getAssets().open("tiles/world_tiles.png"));
                      bmpTrainer = BitmapFactory.decodeStream(getContext().getAssets().open("sprites/trainer.png"));
                      bmpFollower = BitmapFactory.decodeStream(getContext().getAssets().open("sprites/follower.png"));
                      assetsLoaded = true;
                  } catch (Exception e) {}
              }

              @Override public void run() {
                  if (!assetsLoaded) loadAssets();
                  while (running) {
                      if (!getHolder().getSurface().isValid()) continue;
                      Canvas c = getHolder().lockCanvas();
                      update();
                      drawFrame(c);
                      getHolder().unlockCanvasAndPost(c);
                      try { Thread.sleep(16); } catch (Exception e) {}
                  }
              }

              private void update() {
                  // Move towards target
                  if (px < tx) px += speed;
                  else if (px > tx) px -= speed;
                  if (py < ty) py += speed;
                  else if (py > ty) py -= speed;

                  // Reached tile center
                  if (px == tx && py == ty) {
                      isMoving = false;
                      int nextX = gridX, nextY = gridY;

                      if (inUp) { nextY--; direction = 1; isMoving = true; }
                      else if (inDown) { nextY++; direction = 0; isMoving = true; }
                      else if (inLeft) { nextX--; direction = 2; isMoving = true; }
                      else if (inRight) { nextX++; direction = 3; isMoving = true; }

                      if (isMoving) {
                          // Collision check
                          if (nextY >= 0 && nextY < 20 && nextX >= 0 && nextX < 20 && map[nextY][nextX] < 2) {
                              gridX = nextX; gridY = nextY;
                              tx = gridX * 64; ty = gridY * 64;
                          } else {
                              isMoving = false; // Bonk into wall
                          }
                      }
                  }

                  // Animation
                  if (isMoving) {
                      frameCounter++;
                      if (frameCounter > 4) { animStep = (animStep + 1) % 4; frameCounter = 0; }
                  } else {
                      animStep = 0; // Standing
                  }
              }

              private void drawFrame(Canvas c) {
                  c.drawColor(Color.BLACK);
                  if (!assetsLoaded) return;

                  // CAMERA LOGIC: Center on player
                  int screenW = getWidth(), screenH = getHeight();
                  int camX = px - (screenW / 2) + 32;
                  int camY = py - (screenH / 2) + 32;

                  // Draw Map
                  for (int y=0; y<20; y++) {
                      for (int x=0; x<20; x++) {
                          int dstX = (x * 64) - camX;
                          int dstY = (y * 64) - camY;
                          // Only draw if visible on screen
                          if (dstX > -64 && dstX < screenW && dstY > -64 && dstY < screenH) {
                              int t = map[y][x];
                              Rect src = new Rect(t*64, 0, (t*64)+64, 64);
                              Rect dst = new Rect(dstX, dstY, dstX+64, dstY+64);
                              c.drawBitmap(bmpTiles, src, dst, null);
                          }
                      }
                  }

                  // Draw Player in Center of Screen
                  int pScreenX = (screenW / 2) - 32;
                  int pScreenY = (screenH / 2) - 32;
                  
                  // Pokeemerald Brendan sprites are 16x32 per frame
                  int currentFrame = walkCycle[animStep];
                  int srcX = currentFrame * 16;
                  int srcY = direction * 32;
                  Rect src = new Rect(srcX, srcY, srcX + 16, srcY + 32);
                  // Scale 16x32 to 64x128
                  Rect dst = new Rect(pScreenX, pScreenY - 64, pScreenX + 64, pScreenY + 64);
                  c.drawBitmap(bmpTrainer, src, dst, null);
              }
              public void resume() { running = true; thread = new Thread(this); thread.start(); }
              public void pause() { running = false; }
          }""")
          EOF

          # --- SCRIPT 5: ACTIVITY (Correctly Wired Menus) ---
          cat << 'EOF' > scripts/5-main.py
          import os
          def create_file(path, content):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)
          java_path = "app/src/main/java/com/genesis/pokemon"

          create_file(f"{java_path}/MainActivity.java", """package com.genesis.pokemon;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.MotionEvent;
          import android.view.View;
          import android.widget.ArrayAdapter;
          import android.widget.ListView;
          import android.widget.Toast;
          import org.json.JSONArray;
          import java.io.InputStream;
          import java.util.ArrayList;

          public class MainActivity extends Activity {
              private GameView gv;
              private View rpgMenu;
              private ListView dataList;

              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
                  gv = findViewById(R.id.game_viewport);
                  rpgMenu = findViewById(R.id.rpg_menu);
                  dataList = findViewById(R.id.data_list);

                  // Wire D-Pad securely
                  bindBtn(R.id.btn_up, 1); bindBtn(R.id.btn_down, 0);
                  bindBtn(R.id.btn_left, 2); bindBtn(R.id.btn_right, 3);

                  // Wire START Button
                  findViewById(R.id.btn_start).setOnClickListener(v -> {
                      if (rpgMenu.getVisibility() == View.VISIBLE) {
                          rpgMenu.setVisibility(View.GONE); gv.resume();
                      } else {
                          rpgMenu.setVisibility(View.VISIBLE); gv.pause();
                      }
                  });

                  // Wire POKEDEX Button (CRITICAL FIX)
                  findViewById(R.id.menu_pokedex).setOnClickListener(v -> {
                      rpgMenu.setVisibility(View.GONE); dataList.setVisibility(View.VISIBLE);
                      ArrayList<String> entries = new ArrayList<>();
                      try {
                          InputStream is = getAssets().open("pokedex.json");
                          byte[] buf = new byte[is.available()]; is.read(buf);
                          JSONArray arr = new JSONArray(new String(buf));
                          for(int i=0; i<arr.length(); i++) entries.add("#" + arr.getJSONObject(i).getInt("id") + " " + arr.getJSONObject(i).getString("name"));
                      } catch (Exception ex) { entries.add("Error loading Pokedex."); }
                      dataList.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_list_item_1, entries));
                  });

                  // Wire BAG Button
                  findViewById(R.id.menu_bag).setOnClickListener(v -> {
                      rpgMenu.setVisibility(View.GONE); dataList.setVisibility(View.VISIBLE);
                      ArrayList<String> items = new ArrayList<>();
                      items.add("Potion x5"); items.add("Poké Ball x10");
                      dataList.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_list_item_1, items));
                  });

                  // Wire SAVE Button
                  findViewById(R.id.menu_save).setOnClickListener(v -> {
                      Toast.makeText(this, "Saved at Grid: " + gv.gridX + ", " + gv.gridY, Toast.LENGTH_SHORT).show();
                      rpgMenu.setVisibility(View.GONE); gv.resume();
                  });

                  dataList.setOnItemClickListener((parent, view, position, id) -> {
                      dataList.setVisibility(View.GONE); gv.resume();
                  });
              }

              private void bindBtn(int id, int dir) {
                  findViewById(id).setOnTouchListener((v, e) -> {
                      boolean p = (e.getAction() == MotionEvent.ACTION_DOWN || e.getAction() == MotionEvent.ACTION_MOVE);
                      if (dir==1) gv.inUp = p; else if (dir==0) gv.inDown = p;
                      else if (dir==2) gv.inLeft = p; else if (dir==3) gv.inRight = p;
                      return true;
                  });
              }
              @Override protected void onResume() { super.onResume(); gv.resume(); }
              @Override protected void onPause() { super.onPause(); gv.pause(); }
          }""")
          EOF

      - name: Build Perfect APK
        run: |
          cd MyPokemonGame
          python scripts/1-scaffold.py
          python scripts/2-ui.py
          python scripts/3-assets.py
          python scripts/4-engine.py
          python scripts/5-main.py
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Genesis-15.0-Perfect
          path: MyPokemonGame/app/build/outputs/apk/debug/app-debug.apk
