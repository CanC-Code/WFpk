name: Genesis 3.1 - Hoenn Horizon Engine

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: pip install Pillow requests

      - name: Initialize Factory Workspace
        run: mkdir -p MyPokemonGame/scripts

      - name: Generate Genesis Scripts
        run: |
          cd MyPokemonGame
          
          # --- SCRIPT 1: SYSTEM SCAFFOLDING ---
          cat << 'EOF' > scripts/1-scaffold.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          create_file("build.gradle", "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.1.0' } }; allprojects { repositories { google(); mavenCentral() } }")
          create_file("settings.gradle", "include ':app'")
          create_file("app/build.gradle", "plugins { id 'com.android.application' }; android { namespace 'com.genesis.pokemon'; compileSdk 34; defaultConfig { applicationId 'com.genesis.pokemon'; minSdk 24; targetSdk 34; versionCode 1; versionName '1.1' }; buildTypes { release { minifyEnabled false } }; compileOptions { sourceCompatibility JavaVersion.VERSION_1_8; targetCompatibility JavaVersion.VERSION_1_8 } }; dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.9.0' }")
          create_file("app/src/main/AndroidManifest.xml", '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="Genesis 3.1" android:theme="@style/Theme.Material3.DayNight.NoActionBar"><activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity><activity android:name=".PokedexActivity" android:screenOrientation="portrait"/></application></manifest>')
          EOF

          # --- SCRIPT 2: UI & CONTROLLER OVERLAY ---
          cat << 'EOF' > scripts/2-ui.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          layout = """<?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000000">
              <com.genesis.pokemon.GameView android:id="@+id/game_viewport" android:layout_width="match_parent" android:layout_height="match_parent" />
              <GridLayout android:layout_width="160dp" android:layout_height="160dp" android:layout_alignParentBottom="true" android:columnCount="3" android:rowCount="3" android:layout_margin="10dp">
                  <View android:layout_width="53dp" android:layout_height="53dp"/> <Button android:id="@+id/btn_up" android:layout_width="53dp" android:layout_height="53dp" android:text="U"/> <View android:layout_width="53dp" android:layout_height="53dp"/>
                  <Button android:id="@+id/btn_left" android:layout_width="53dp" android:layout_height="53dp" android:text="L"/> <View android:layout_width="53dp" android:layout_height="53dp"/> <Button android:id="@+id/btn_right" android:layout_width="53dp" android:layout_height="53dp" android:text="R"/>
                  <View android:layout_width="53dp" android:layout_height="53dp"/> <Button android:id="@+id/btn_down" android:layout_width="53dp" android:layout_height="53dp" android:text="D"/> <View android:layout_width="53dp" android:layout_height="53dp"/>
              </GridLayout>
              <RelativeLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_alignParentBottom="true" android:layout_alignParentEnd="true" android:layout_margin="20dp">
                  <Button android:id="@+id/btn_b" android:layout_width="75dp" android:layout_height="75dp" android:text="B" android:backgroundTint="#FF5252" android:layout_marginEnd="85dp"/>
                  <Button android:id="@+id/btn_a" android:layout_width="75dp" android:layout_height="75dp" android:text="A" android:backgroundTint="#448AFF" android:layout_toEndOf="@id/btn_b" android:layout_marginTop="-25dp"/>
              </RelativeLayout>
              <Button android:id="@+id/btn_start" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="POKEDEX" android:layout_centerHorizontal="true" android:layout_alignParentBottom="true" android:layout_marginBottom="10dp" android:backgroundTint="#757575"/>
          </RelativeLayout>"""
          create_file("app/src/main/res/layout/activity_main.xml", layout)
          create_file("app/src/main/res/values/strings.xml", '<resources><string name="app_name">Genesis</string></resources>')
          EOF

          # --- SCRIPT 3: MULTITHREADED ASSET RIPPER ---
          cat << 'EOF' > scripts/3-assets.py
          import os, requests, json
          from concurrent.futures import ThreadPoolExecutor

          os.makedirs("app/src/main/assets/sprites", exist_ok=True)
          pokedex_data = []

          def fetch_pkm(p_id):
              try:
                  res = requests.get(f"https://pokeapi.co/api/v2/pokemon/{p_id}", timeout=10).json()
                  name = res['name']
                  img = requests.get(res['sprites']['front_default']).content
                  with open(f"app/src/main/assets/sprites/{name}.png", 'wb') as f: f.write(img)
                  return {"id": p_id, "name": name.capitalize()}
              except: return None

          print("Ripping Pokemon Assets...")
          with ThreadPoolExecutor(max_workers=10) as ex:
              pokedex_data = list(filter(None, ex.map(fetch_pkm, range(1, 152))))
          with open("app/src/main/assets/pokedex.json", 'w') as f: json.dump(pokedex_data, f)
          EOF

          # --- SCRIPT 4: CORE ENGINE (Renderer & Typos Fixed) ---
          cat << 'EOF' > scripts/4-engine.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          java_path = "app/src/main/java/com/genesis/pokemon"

          # SpriteManager
          create_file(f"{java_path}/SpriteManager.java", """package com.genesis.pokemon;
          import android.content.Context;
          import android.graphics.Bitmap;
          import android.graphics.BitmapFactory;
          import java.util.HashMap;
          public class SpriteManager {
              private static HashMap<String, Bitmap> cache = new HashMap<>();
              public static Bitmap get(Context ctx, String name) {
                  if (cache.containsKey(name)) return cache.get(name);
                  try {
                      Bitmap b = BitmapFactory.decodeStream(ctx.getAssets().open("sprites/" + name + ".png"));
                      cache.put(name, b);
                      return b;
                  } catch (Exception e) { return null; }
              }
          }""")

          # GameView
          create_file(f"{java_path}/GameView.java", """package com.genesis.pokemon;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.SurfaceView;
          import java.util.LinkedList;

          public class GameView extends SurfaceView implements Runnable {
              private Thread thread;
              private boolean r;
              public float px=400, py=400, fx=400, fy=480;
              public boolean mU, mD, mL, mR;
              private LinkedList<PointF> history = new LinkedList<>();

              public GameView(Context c, AttributeSet a) { super(c, a); }

              @Override public void run() {
                  while (r) {
                      if (!getHolder().getSurface().isValid()) continue;
                      Canvas c = getHolder().lockCanvas();
                      update();
                      draw(c);
                      getHolder().unlockCanvasAndPost(c);
                  }
              }
              private void update() {
                  float s = 8; float ox = px, oy = py;
                  if (mU) py -= s; if (mD) py += s; if (mL) px -= s; if (mR) px += s;
                  if (px != ox || py != oy) {
                      history.addFirst(new PointF(px, py));
                      if (history.size() > 12) { PointF l = history.removeLast(); fx = l.x; fy = l.y; }
                  }
              }
              public void draw(Canvas c) {
                  c.drawColor(Color.parseColor("#388E3C")); // Grass
                  Bitmap pS = SpriteManager.get(getContext(), "bulbasaur");
                  Bitmap fS = SpriteManager.get(getContext(), "pikachu");
                  if (pS != null) c.drawBitmap(pS, px-64, py-64, null);
                  if (fS != null) c.drawBitmap(fS, fx-64, fy-64, null);
              }
              public void resume() { r = true; thread = new Thread(this); thread.start(); }
              public void pause() { r = false; }
          }""")

          # MainActivity
          create_file(f"{java_path}/MainActivity.java", """package com.genesis.pokemon;
          import android.app.Activity;
          import android.content.Intent;
          import android.os.Bundle;
          import android.view.MotionEvent;

          public class MainActivity extends Activity {
              private GameView gv;
              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
                  gv = findViewById(R.id.game_viewport);
                  bind(R.id.btn_up, 1); bind(R.id.btn_down, 2);
                  bind(R.id.btn_left, 3); bind(R.id.btn_right, 4);
                  findViewById(R.id.btn_start).setOnClickListener(v -> startActivity(new Intent(this, PokedexActivity.class)));
              }
              private void bind(int id, int d) {
                  findViewById(id).setOnTouchListener((v, e) -> {
                      boolean p = (e.getAction() == MotionEvent.ACTION_DOWN || e.getAction() == MotionEvent.ACTION_MOVE);
                      if (d==1) gv.mU=p; if (d==2) gv.mD=p; if (d==3) gv.mL=p; if (d==4) gv.mR=p;
                      return true;
                  });
              }
              @Override protected void onResume() { super.onResume(); gv.resume(); }
              @Override protected void onPause() { super.onPause(); gv.pause(); }
          }""")
          EOF

          # --- SCRIPT 5: POKEDEX UI ---
          cat << 'EOF' > scripts/5-pokedex.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          java_path = "app/src/main/java/com/genesis/pokemon"
          create_file("app/src/main/res/layout/activity_pokedex.xml", '<?xml version="1.0" encoding="utf-8"?><LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:background="#121212" android:padding="16dp"><TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="POKEDEX" android:textColor="#FF0000" android:textSize="24sp"/><ListView android:id="@+id/plist" android:layout_width="match_parent" android:layout_height="match_parent" /></LinearLayout>')
          create_file(f"{java_path}/PokedexActivity.java", """package com.genesis.pokemon;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.ArrayAdapter;
          import android.widget.ListView;
          import org.json.JSONArray;
          import java.io.InputStream;
          import java.util.ArrayList;
          public class PokedexActivity extends Activity {
              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_pokedex);
                  ListView list = findViewById(R.id.plist);
                  ArrayList<String> n = new ArrayList<>();
                  try {
                      InputStream is = getAssets().open("pokedex.json");
                      byte[] buf = new byte[is.available()]; is.read(buf);
                      JSONArray arr = new JSONArray(new String(buf));
                      for(int i=0; i<arr.length(); i++) n.add(arr.getJSONObject(i).getString("name"));
                  } catch (Exception e) {}
                  list.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_list_item_1, n));
              }
          }""")
          EOF

      - name: Execute Genesis Pipeline
        run: |
          cd MyPokemonGame
          python scripts/1-scaffold.py
          python scripts/2-ui.py
          python scripts/3-assets.py
          python scripts/4-engine.py
          python scripts/5-pokedex.py

      - name: Assemble APK
        run: |
          cd MyPokemonGame
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Genesis-3.1-APK
          path: MyPokemonGame/app/build/outputs/apk/debug/app-debug.apk
