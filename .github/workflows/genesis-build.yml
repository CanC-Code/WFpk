name: Genesis 13.0 - High-Fidelity Sinnoh

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: pip install Pillow requests

      - name: Initialize Workspace
        run: mkdir -p MyPokemonGame/scripts

      - name: Generate Genesis Scripts
        run: |
          cd MyPokemonGame
          
          # --- 1. SCAFFOLD (AndroidX & Versioning) ---
          cat << 'EOF' > scripts/1-scaffold.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)
          create_file("build.gradle", "plugins { id 'com.android.application' version '8.4.0' apply false }")
          create_file("settings.gradle", "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }; dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }; include ':app'")
          create_file("gradle.properties", "android.useAndroidX=true\nandroid.enableJetifier=true")
          create_file("app/build.gradle", "plugins { id 'com.android.application' }; android { namespace 'com.genesis.pokemon'; compileSdk 34; defaultConfig { applicationId 'com.genesis.pokemon'; minSdk 24; targetSdk 34; versionCode 1; versionName '5.0' }; buildTypes { release { minifyEnabled false } }; compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 } }; dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.9.0' }")
          create_file("app/src/main/AndroidManifest.xml", '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="Pokemon Platinum" android:theme="@style/Theme.Material3.DayNight.NoActionBar"><activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>')
          EOF

          # --- 2. UI (Joystick & HUD) ---
          cat << 'EOF' > scripts/2-ui.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)
          layout = """<?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000000">
              <com.genesis.pokemon.GameView android:id="@+id/game_viewport" android:layout_width="match_parent" android:layout_height="match_parent" />
              <View android:id="@+id/joystick_base" android:layout_width="180dp" android:layout_height="180dp" android:layout_gravity="bottom|start" android:layout_margin="20dp" android:background="@android:drawable/btn_default_small" android:alpha="0.2"/>
              <RelativeLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_gravity="bottom|end" android:layout_margin="30dp">
                  <Button android:id="@+id/btn_b" android:layout_width="70dp" android:layout_height="70dp" android:text="B" android:backgroundTint="#D32F2F" android:layout_marginEnd="10dp"/>
                  <Button android:id="@+id/btn_a" android:layout_width="70dp" android:layout_height="70dp" android:text="A" android:backgroundTint="#1976D2" android:layout_toEndOf="@id/btn_b" android:layout_marginTop="-20dp"/>
              </RelativeLayout>
          </FrameLayout>"""
          create_file("app/src/main/res/layout/activity_main.xml", layout)
          EOF

          # --- 3. ASSETS (Correct Sprite Sheets & World Tiles) ---
          cat << 'EOF' > scripts/3-assets.py
          import os, requests
          from PIL import Image, ImageDraw
          os.makedirs("app/src/main/assets/sprites", exist_ok=True)
          os.makedirs("app/src/main/assets/tiles", exist_ok=True)
          
          # 1. Fetch High-Fidelity Sinnoh Trainer (16x32px per frame)
          # We use the Emerald Brendan sheet as it is the most reliable for 4-way slicing
          trainer_url = "https://raw.githubusercontent.com/pret/pokeemerald/master/graphics/object_events/pics/people/brendan/normal.png"
          with open("app/src/main/assets/sprites/trainer_sheet.png", 'wb') as f:
              f.write(requests.get(trainer_url).content)
          
          # 2. Generate a stylized Town Tileset (Grass, Path, House, Tree)
          tiles = Image.new("RGBA", (256, 64), (0,0,0,0))
          d = ImageDraw.Draw(tiles)
          d.rectangle([0,0,64,64], fill="#43A047")    # 0: Grass
          d.rectangle([64,0,128,64], fill="#9E9E9E")  # 1: Path
          d.rectangle([128,0,192,64], fill="#5D4037") # 2: Building
          d.rectangle([192,0,256,64], fill="#1B5E20") # 3: Tree
          tiles.save("app/src/main/assets/tiles/world_tiles.png")
          EOF

          # --- 4. ENGINE (The Discrete Stepping Logic) ---
          cat << 'EOF' > scripts/4-engine.py
          import os
          def create_file(path, content):
              dir_name = os.path.dirname(path)
              if dir_name: os.makedirs(dir_name, exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)
          java_path = "app/src/main/java/com/genesis/pokemon"

          # AssetManager (Critical for performance)
          create_file(f"{java_path}/AssetManager.java", """package com.genesis.pokemon;
          import android.content.Context;
          import android.graphics.Bitmap;
          import android.graphics.BitmapFactory;
          import java.util.HashMap;
          public class AssetManager {
              private static HashMap<String, Bitmap> cache = new HashMap<>();
              public static Bitmap get(Context ctx, String name) {
                  if (cache.containsKey(name)) return cache.get(name);
                  try {
                      Bitmap b = BitmapFactory.decodeStream(ctx.getAssets().open(name + ".png"));
                      cache.put(name, b); return b;
                  } catch (Exception e) { return null; }
              }
          }""")

          # GameView (The Tile-Stepping Engine)
          create_file(f"{java_path}/GameView.java", """package com.genesis.pokemon;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.SurfaceView;

          public class GameView extends SurfaceView implements Runnable {
              private Thread thread;
              private boolean r;
              
              // Physics (Tile size = 64)
              public float px=128, py=128;
              public float tx=128, ty=128; // Target X,Y for stepping
              public float vx=0, vy=0;
              
              private int direction = 0; // 0:Down, 1:Up, 2:Left, 3:Right
              private int animFrame = 0, frameCounter = 0;

              // Map (0:Grass, 1:Path, 2:Building, 3:Tree)
              private int[][] map = {
                  {3,3,3,3,3,3,3,3,3,3},
                  {3,0,0,1,1,1,1,0,0,3},
                  {3,0,0,1,2,2,1,0,0,3},
                  {3,3,3,3,3,3,3,3,3,3}
              };

              public GameView(Context c, AttributeSet a) { super(c, a); }

              @Override public void run() {
                  while (r) {
                      if (!getHolder().getSurface().isValid()) continue;
                      Canvas c = getHolder().lockCanvas();
                      update();
                      drawFrame(c);
                      getHolder().unlockCanvasAndPost(c);
                      try { Thread.sleep(16); } catch (Exception e) {}
                  }
              }

              private void update() {
                  float speed = 4;
                  
                  // If we haven't reached our target tile yet, keep moving
                  if (px < tx) px = Math.min(px + speed, tx);
                  else if (px > tx) px = Math.max(px - speed, tx);
                  if (py < ty) py = Math.min(py + speed, ty);
                  else if (py > ty) py = Math.max(py - speed, ty);

                  // If we are at the target tile, check for new input
                  if (px == tx && py == ty) {
                      if (vx != 0 || vy != 0) {
                          float ntx = tx, nty = ty;
                          if (Math.abs(vx) > Math.abs(vy)) {
                              ntx += (vx > 0) ? 64 : -64; direction = (vx > 0) ? 3 : 2;
                          } else {
                              nty += (vy > 0) ? 64 : -64; direction = (vy > 0) ? 0 : 1;
                          }
                          // Collision Check
                          int gx = (int)(ntx / 64), gy = (int)(nty / 64);
                          if (gy >= 0 && gy < map.length && gx >= 0 && gx < map[0].length) {
                              if (map[gy][gx] < 2) { tx = ntx; ty = nty; }
                          }
                      }
                      animFrame = 1; // Idle
                  } else {
                      // We are moving, cycle animation
                      frameCounter++;
                      if (frameCounter > 6) { animFrame = (animFrame + 1) % 3; frameCounter = 0; }
                  }
              }

              private void drawFrame(Canvas c) {
                  c.drawColor(Color.BLACK);
                  Bitmap tiles = AssetManager.get(getContext(), "tiles/world_tiles");
                  if (tiles != null) {
                      for (int y=0; y<map.length; y++) {
                          for (int x=0; x<map[0].length; x++) {
                              int t = map[y][x];
                              Rect src = new Rect(t*64, 0, (t*64)+64, 64);
                              Rect dst = new Rect(x*128, y*128, (x+1)*128, (y+1)*128);
                              c.drawBitmap(tiles, src, dst, null);
                          }
                      }
                  }

                  Bitmap trainer = AssetManager.get(getContext(), "sprites/trainer_sheet");
                  if (trainer != null) {
                      // Accurate Slicing for Brendan Sheet (16x32 per frame)
                      int sx = animFrame * 16, sy = direction * 32;
                      Rect src = new Rect(sx, sy, sx + 16, sy + 32);
                      Rect dst = new Rect((int)(px*2)-48, (int)(py*2)-96, (int)(px*2)+48, (int)(py*2)+96);
                      c.drawBitmap(trainer, src, dst, null);
                  }
              }
              public void resume() { r = true; thread = new Thread(this); thread.start(); }
              public void pause() { r = false; }
          }""")
          
          # Fix MainActivity
          create_file(f"{java_path}/MainActivity.java", """package com.genesis.pokemon;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.MotionEvent;

          public class MainActivity extends Activity {
              private GameView gv;
              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
                  gv = findViewById(R.id.game_viewport);
                  findViewById(R.id.joystick_base).setOnTouchListener((v, e) -> {
                      if (e.getAction() == MotionEvent.ACTION_UP) { gv.vx=0; gv.vy=0; }
                      else {
                          gv.vx = e.getX() - (v.getWidth()/2f);
                          gv.vy = e.getY() - (v.getHeight()/2f);
                      }
                      return true;
                  });
              }
              @Override protected void onResume() { super.onResume(); gv.resume(); }
          }""")
          EOF

      - name: Build Project
        run: |
          cd MyPokemonGame
          python scripts/1-scaffold.py
          python scripts/2-ui.py
          python scripts/3-assets.py
          python scripts/4-engine.py
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Platinum-Zenith-v13
          path: MyPokemonGame/app/build/outputs/apk/debug/app-debug.apk
